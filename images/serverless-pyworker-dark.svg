<svg viewBox="0 0 1000 620" width="1000" height="620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#f4f4f5"/>
    </marker>
  </defs>
  <style>
    .text { fill: #f4f4f5; font-family: system-ui, sans-serif; }
    .arrow-line { fill: none; stroke: #f4f4f5; stroke-width: 2; }
    .badge-circle { fill: #27272a; stroke: #f4f4f5; stroke-width: 1.5; }
  </style>

  <!-- ============= ENTITIES ============= -->
  <!-- User -->
  <g transform="translate(170,200)">
    <circle r="50" fill="#3DBE5C"/>
    <circle cy="-13" r="14" fill="#fff"/>
    <path d="M-23 27 C -23 8, 23 8, 23 27 Z" fill="#fff"/>
  </g>
  <text class="text" x="170" y="278" text-anchor="middle" font-size="16" font-weight="600">User</text>

  <!-- PyWorker -->
  <g transform="translate(490,200)">
    <circle r="54" fill="#1F4F8B"/>
    <rect x="-13" y="-31" width="26" height="22" rx="3" fill="#fff"/>
    <line x1="0" y1="-31" x2="0" y2="-35" stroke="#fff" stroke-width="2"/>
    <circle cx="0" cy="-37" r="2.5" fill="#fff"/>
    <circle cx="-5" cy="-20" r="2.5" fill="#1F4F8B"/>
    <circle cx="5" cy="-20" r="2.5" fill="#1F4F8B"/>
    <rect x="-20" y="-4" width="40" height="26" rx="3" fill="#fff"/>
    <rect x="-10" y="4" width="20" height="12" rx="1" fill="#1F4F8B"/>
    <rect x="-28" y="-2" width="6" height="18" rx="2" fill="#fff"/>
    <rect x="22" y="-2" width="6" height="18" rx="2" fill="#fff"/>
  </g>
  <text class="text" x="490" y="282" text-anchor="middle" font-size="16" font-weight="600">PyWorker</text>

  <!-- MI Server -->
  <g transform="translate(840,200)">
    <circle r="52" fill="#5FAFF0"/>
    <path d="M -22 -10 Q -26 -4 -26 4 Q -26 14 -18 18 Q -12 22 -2 22 L -2 -20 Q -10 -24 -16 -18 Q -22 -16 -22 -10 Z" fill="#fff"/>
    <path d="M 22 -10 Q 26 -4 26 4 Q 26 14 18 18 Q 12 22 2 22 L 2 -20 Q 10 -24 16 -18 Q 22 -16 22 -10 Z" fill="#fff"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#5FAFF0" stroke-width="2"/>
    <path d="M -18 -4 Q -10 -10 -4 -4" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
    <path d="M -18 8 Q -10 4 -4 8" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
    <path d="M 4 -4 Q 10 -10 18 -4" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
    <path d="M 4 8 Q 10 4 18 8" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
  </g>
  <text class="text" x="840" y="280" text-anchor="middle" font-size="16" font-weight="600">Model Inference</text>
  <text class="text" x="840" y="300" text-anchor="middle" font-size="16" font-weight="600">Server</text>

  <!-- Engine directly below User -->
  <g transform="translate(170,490)">
    <circle r="50" fill="#5FAFF0"/>
    <path d="M -8 -22 L 4 -6 L -2 -2 L 8 22 L -4 6 L 2 2 Z" fill="#fff"/>
  </g>
  <text class="text" x="170" y="562" text-anchor="middle" font-size="16" font-weight="600">Serverless</text>
  <text class="text" x="170" y="580" text-anchor="middle" font-size="16" font-weight="600">Engine</text>

  <!-- ============= HORIZONTAL ARROWS ============= -->
  <!-- 3: User -> PyWorker -->
  <line class="arrow-line" x1="228" y1="185" x2="428" y2="185" marker-end="url(#ah)"/>
  <g>
    <circle class="badge-circle" cx="328" cy="136" r="13"/>
    <text class="text" x="328" y="141" text-anchor="middle" font-size="13">3</text>
  </g>
  <text class="text" x="328" y="170" text-anchor="middle" font-size="14">Inference Requests</text>

  <!-- 6: PyWorker -> User -->
  <line class="arrow-line" x1="428" y1="215" x2="228" y2="215" marker-end="url(#ah)"/>
  <text class="text" x="328" y="242" text-anchor="middle" font-size="14">Results</text>
  <g>
    <circle class="badge-circle" cx="328" cy="268" r="13"/>
    <text class="text" x="328" y="273" text-anchor="middle" font-size="13">6</text>
  </g>

  <!-- 4: PyWorker -> MI Server -->
  <line class="arrow-line" x1="548" y1="185" x2="786" y2="185" marker-end="url(#ah)"/>
  <g>
    <circle class="badge-circle" cx="667" cy="136" r="13"/>
    <text class="text" x="667" y="141" text-anchor="middle" font-size="13">4</text>
  </g>
  <text class="text" x="667" y="170" text-anchor="middle" font-size="14">Inference Requests</text>

  <!-- 5: MI Server -> PyWorker -->
  <line class="arrow-line" x1="786" y1="215" x2="548" y2="215" marker-end="url(#ah)"/>
  <text class="text" x="667" y="242" text-anchor="middle" font-size="14">Results</text>
  <g>
    <circle class="badge-circle" cx="667" cy="268" r="13"/>
    <text class="text" x="667" y="273" text-anchor="middle" font-size="13">5</text>
  </g>

  <!-- 7: PyWorker -> Engine (straight diagonal) -->
  <line class="arrow-line" x1="445" y1="240" x2="212" y2="452" marker-end="url(#ah)"/>
  <g>
    <circle class="badge-circle" cx="405" cy="338" r="13"/>
    <text class="text" x="405" y="343" text-anchor="middle" font-size="13">7</text>
  </g>
  <text class="text" x="405" y="370" text-anchor="middle" font-size="14">Metrics</text>

  <!-- 1: User -> Engine (straight vertical, on left) -->
  <line class="arrow-line" x1="140" y1="247" x2="140" y2="445" marker-end="url(#ah)"/>
  <g>
    <circle class="badge-circle" cx="60" cy="338" r="13"/>
    <text class="text" x="60" y="343" text-anchor="middle" font-size="13">1</text>
  </g>
  <text class="text" x="60" y="370" text-anchor="middle" font-size="14">Route Requests</text>

  <!-- 2: Engine -> User (straight vertical, on right) -->
  <line class="arrow-line" x1="200" y1="445" x2="200" y2="247" marker-end="url(#ah)"/>
  <g>
    <circle class="badge-circle" cx="250" cy="338" r="13"/>
    <text class="text" x="250" y="343" text-anchor="middle" font-size="13">2</text>
  </g>
  <text class="text" x="250" y="370" text-anchor="middle" font-size="14">Responses</text>
</svg>
