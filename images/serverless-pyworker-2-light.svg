<svg viewBox="0 0 800 286" width="800" height="286" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #fafafa; stroke: #d4d4d8; stroke-width: 1.5; }
    .text { fill: #18181b; font-family: system-ui, sans-serif; }
    .arrow { stroke: #18181b; fill: #18181b; stroke-width: 2; }
    .arrow-line { fill: none; stroke: #18181b; stroke-width: 2; }
  </style>

  <!-- Section labels above boxes -->
  <text class="text" x="80" y="22" font-size="14" font-weight="600">User</text>
  <text class="text" x="320" y="22" font-size="14" font-weight="600">GPU Instance</text>

  <!-- User box (left, narrow) -->
  <rect class="box" x="20" y="34" width="160" height="232" rx="10"/>

  <!-- GPU Instance box (right, wide) -->
  <rect class="box" x="260" y="34" width="520" height="232" rx="10"/>

  <!-- Client (green person icon) -->
  <g transform="translate(100,140)">
    <circle r="40" fill="#3DBE5C"/>
    <circle cy="-10" r="11" fill="#fff"/>
    <path d="M-19 22 C -19 6, 19 6, 19 22 Z" fill="#fff"/>
  </g>
  <text class="text" x="100" y="220" text-anchor="middle" font-size="13">Client</text>

  <!-- Bidirectional arrow Client -> PyWorker (HTTP Request) -->
  <g class="arrow-line">
    <path d="M 180 134 L 250 134"/>
    <polygon points="250,134 240,128 240,140" fill="#18181b" stroke="none"/>
    <path d="M 250 154 L 180 154"/>
    <polygon points="180,154 190,148 190,160" fill="#18181b" stroke="none"/>
  </g>
  <text class="text" x="215" y="180" text-anchor="middle" font-size="12">HTTP</text>
  <text class="text" x="215" y="194" text-anchor="middle" font-size="12">Request</text>

  <!-- PyWorker (dark blue robot) -->
  <g transform="translate(340,140)">
    <circle r="40" fill="#1F4F8B"/>
    <!-- robot head -->
    <rect x="-11" y="-26" width="22" height="20" rx="3" fill="#fff"/>
    <line x1="0" y1="-26" x2="0" y2="-30" stroke="#fff" stroke-width="2"/>
    <circle cx="0" cy="-32" r="2" fill="#fff"/>
    <circle cx="-4" cy="-17" r="2" fill="#1F4F8B"/>
    <circle cx="4" cy="-17" r="2" fill="#1F4F8B"/>
    <!-- robot body -->
    <rect x="-16" y="-4" width="32" height="22" rx="3" fill="#fff"/>
    <rect x="-8" y="3" width="16" height="10" rx="1" fill="#1F4F8B"/>
    <!-- arms -->
    <rect x="-22" y="-2" width="5" height="14" rx="2" fill="#fff"/>
    <rect x="17" y="-2" width="5" height="14" rx="2" fill="#fff"/>
  </g>
  <text class="text" x="340" y="220" text-anchor="middle" font-size="13">PyWorker</text>

  <!-- Bidirectional arrow PyWorker -> Model Server -->
  <g class="arrow-line">
    <path d="M 384 134 L 482 134"/>
    <polygon points="482,134 472,128 472,140" fill="#18181b" stroke="none"/>
    <path d="M 482 154 L 384 154"/>
    <polygon points="384,154 394,148 394,160" fill="#18181b" stroke="none"/>
  </g>
  <text class="text" x="433" y="124" text-anchor="middle" font-size="11">EndpointHandler</text>

  <!-- Model Server (blue server tower) -->
  <g transform="translate(530,140)">
    <circle r="40" fill="#5FAFF0"/>
    <rect x="-16" y="-22" width="32" height="12" rx="2" fill="#fff"/>
    <rect x="-16" y="-6" width="32" height="12" rx="2" fill="#fff"/>
    <rect x="-16" y="10" width="32" height="12" rx="2" fill="#fff"/>
    <circle cx="-10" cy="-16" r="1.5" fill="#5FAFF0"/>
    <circle cx="-10" cy="0" r="1.5" fill="#5FAFF0"/>
    <circle cx="-10" cy="16" r="1.5" fill="#5FAFF0"/>
    <line x1="3" y1="-16" x2="11" y2="-16" stroke="#5FAFF0" stroke-width="1.5"/>
    <line x1="3" y1="0" x2="11" y2="0" stroke="#5FAFF0" stroke-width="1.5"/>
    <line x1="3" y1="16" x2="11" y2="16" stroke="#5FAFF0" stroke-width="1.5"/>
  </g>
  <text class="text" x="530" y="220" text-anchor="middle" font-size="13">Model Server</text>

  <!-- Bidirectional arrow Model Server -> ML Model -->
  <g class="arrow-line">
    <path d="M 574 134 L 668 134"/>
    <polygon points="668,134 658,128 658,140" fill="#18181b" stroke="none"/>
    <path d="M 668 154 L 574 154"/>
    <polygon points="574,154 584,148 584,160" fill="#18181b" stroke="none"/>
  </g>

  <!-- ML Model (light blue brain) -->
  <g transform="translate(715,140)">
    <circle r="40" fill="#5FAFF0"/>
    <!-- brain shape: two lobes -->
    <path d="M -20 -8 Q -24 -4 -24 4 Q -24 14 -16 18 Q -10 22 -2 22 L -2 -18 Q -10 -22 -16 -16 Q -20 -14 -20 -8 Z" fill="#fff"/>
    <path d="M 20 -8 Q 24 -4 24 4 Q 24 14 16 18 Q 10 22 2 22 L 2 -18 Q 10 -22 16 -16 Q 20 -14 20 -8 Z" fill="#fff"/>
    <!-- center divider -->
    <line x1="0" y1="-20" x2="0" y2="22" stroke="#5FAFF0" stroke-width="2"/>
    <!-- gyri lines -->
    <path d="M -16 -4 Q -10 -8 -4 -4" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
    <path d="M -16 8 Q -10 4 -4 8" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
    <path d="M 4 -4 Q 10 -8 16 -4" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
    <path d="M 4 8 Q 10 4 16 8" fill="none" stroke="#5FAFF0" stroke-width="1.5"/>
  </g>
  <text class="text" x="715" y="220" text-anchor="middle" font-size="13">ML Model</text>
</svg>
