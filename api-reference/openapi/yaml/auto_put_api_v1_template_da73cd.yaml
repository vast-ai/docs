      x-scope: user_write
      x-rateLimit: 1.9
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hash_id:
                  type: string
                  description: Current MD5 hash of the template to update, used to verify the correct version is being modified
                    (required)
