                template:
                  type: object
                  description: Template object whose hash_id is used as a fallback to identify the template to update when
                    no top-level hash_id is provided.
      responses:
        '200':
          description: 'Returns {success: true, hash_id, msg, template}; msg varies: "No Edits made...", "Created an Edited
            Copy...", or "Created an Edited Copy of Template..."'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  hash_id:
                    type: string
                    description: Hash ID (present when no edits were made)
                  msg:
                    type: string
                    description: 'Outcome description, e.g. ''Created an Edited Copy of Template 123. New Template ID: 456''
