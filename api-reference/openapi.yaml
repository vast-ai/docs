  /api/v0/volumes/copy/:
    post:
      summary: Copy Volume
      tags:
      - Volumes
      description: Clones an existing volume (src_id) into a new volume provisioned
        from a destination ask (dst_id), optionally resizing.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 1
      responses:
        '200':
          description: Successful response from volume creation with copy operation
            (shape determined by create_volume helper)
