      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 1.6
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the user whose template library to retrieve (URL path parameter)
      responses:
        '200':
          description: 'Returns {success: true, templates: [...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
