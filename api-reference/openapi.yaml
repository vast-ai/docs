  /api/v0/instances/{id}/ssh/:
    get:
      summary: Get Instance SSH Keys
      tags:
      - Instances
      description: Returns the SSH keys currently associated with the specified instance.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Instance contract ID whose SSH keys to retrieve.
      responses:
        '200':
          description: 'Returns {success: false, error: "no_such_instance", msg: "Instance
            {id} not found."} when the instance is not found or not owned by the user.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True on success
                  ssh_keys:
                    type: string
                    description: JSON-encoded array of SSH key objects
    post:
      summary: Add SSH Key to Instance
      tags:
      - Instances
      description: Adds a new SSH public key to the specified instance, creating the
        key record if it does not already exist.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the instance to attach the SSH key to
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                instance_id:
                  type: integer
                  description: ID of the instance to attach the SSH key to; takes
                    precedence over the id in the URL path.
                  example: 12345
                ssh_key:
                  type: string
                  description: The SSH key to attach to the instance
                  example: ssh-rsa AAAAB3NzaC1yc2EAAA...
      responses:
        '200':
          description: 'Returns {success: true, msg: "SSH key added to instance.",
            key} on success, or {success: false, msg: "SSH key already associated
            with instance."} if already present.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when key was added
                  msg:
                    type: string
                    description: Human-readable message
                  key:
                    type: string
                    description: JSON-encoded SSH key object (on success)
        '400':
          description: 'Returns {success: false, error: "no_ssh_key", msg: "No ssh
            key provided to add to instance."} when ssh_key param is missing.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update Instance SSH Key
      tags:
      - Instances
      description: Updates the public key value of an existing SSH key associated
        with the specified instance.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Instance contract ID on which to update the SSH key.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ssh_key_id:
                  type: integer
                  description: ID of the SSH key record to update.
                  example: 42
                ssh_key:
                  type: string
                  description: New public key string to set on the SSH key record.
                  example: ssh-rsa AAAAB3NzaC1yc2E...
      responses:
        '200':
          description: 'Returns {success: false, error: "no_such_instance"} if the
            instance is not found or not owned by the caller, or {success: false,
            error: "add_ssh_to_instance"} on unexpected error.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when updated
                  msg:
                    type: string
                    description: Human-readable status message
                  key:
                    type: string
                    description: JSON-encoded updated SSH key object
              example:
                success: true
                msg: SSH key was updated.
                key: '{}'
