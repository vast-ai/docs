            volume listing."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/webhooks/{id}/rotate-secret/:
    post:
      summary: Rotate Webhook Secret
      tags:
      - Accounts
      description: Rotate the signing secret for one of the caller's webhooks; the
        new secret is returned once and the prior secret is invalidated immediately.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of the webhook whose signing secret is being
          rotated.
      responses:
        '200':
          description: 'Success; returns {success: true, webhook: object} where webhook
            includes the new webhook_secret (revealed once only)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  webhook:
                    type: object
                    description: The webhook object with id, user_id, name, webhook_url,
                      event_types, created_at, updated_at, and the new webhook_secret.
                    properties:
                      id:
                        type: integer
                        description: Webhook ID.
                      user_id:
                        type: integer
                        description: Owning user ID.
                      name:
                        type: string
                        description: Optional display name.
                      webhook_url:
                        type: string
                        description: The HTTPS endpoint URL.
                      event_types:
                        type: array
                        items:
                          type: string
                        description: Subscribed event type slugs.
                      created_at:
                        type: number
                        description: Unix timestamp of creation.
                      updated_at:
                        type: number
                        description: Unix timestamp of last update.
                      webhook_secret:
                        type: string
                        description: New signing secret; returned only at rotation
                          time.
        '404':
          description: 'Webhook not found; returns {success: false, msg: ''Webhook
            not found''}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/webhooks/{id}/test/:
    post:
      summary: Send Webhook Test Event
      tags:
      - Accounts
      description: Fire a canned test event at one of the caller's webhooks to verify
        end-to-end delivery without persisting a notification record.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of the webhook to send a test event to.
      responses:
        '200':
          description: 'Success; returns {success: true, webhook_id: int, event_id:
            string}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  webhook_id:
                    type: integer
                    description: ID of the webhook that received the test event.
                  event_id:
                    type: string
                    description: Unique hex event identifier used in the delivered
                      payload.
              example:
                success: true
                webhook_id: 42
                event_id: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        '400':
          description: 'Permanent delivery failure; returns {success: false, msg:
            ''Webhook URL is not deliverable''}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Webhook not found; returns {success: false, msg: ''Webhook
            not found''}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: 'Transient delivery failure; returns {success: false, msg:
            ''Webhook delivery failed''}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/templates/fetch-tags:
