                    items:
                      type: object
        '400':
          description: "Bad request \u2014 missing/invalid parameters (response body\
            \ contains an `error_msg` string)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_msg:
                    type: string
  /route/:
    post:
      summary: Route Serverless Request
      description: Ask the serverless router for a ready worker to handle one request
        against a serverless endpoint group. Returns the worker URL (plus a signature
        the worker validates) or a backlog/scaling status when no worker is immediately
        available.
      tags:
      - Serverless
      servers:
      - url: https://run.vast.ai
        description: Serverless request router
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint_id:
                  type: integer
                  description: Endpoint group id (supply this or `endpoint`).
                endpoint:
                  type: string
                  description: Endpoint group name (supply this or `endpoint_id`).
                api_key:
                  type: string
                  description: Endpoint API key. May instead be supplied as a Bearer
                    token in the Authorization header.
                cost:
                  type: number
                  description: "Estimated request cost in cost units (must be \u2265\
                    \ 0)."
                latency:
                  type: number
                  description: Average time a single worker takes to complete this
                    request, in seconds.
                request_idx:
                  type: integer
                  description: Request index; 0 (or omitted) starts a new request,
                    a prior value re-polls it.
                guid:
                  type: integer
                  description: Client-supplied request identifier.
                replay_timeout:
                  type: number
                  description: Seconds after which an unanswered request may be replayed
                    on another worker.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: string
                  request_idx:
                    type: integer
                  url:
                    type: string
                    description: Worker URL to send the request to (present when a
                      worker is ready).
                  cost:
                    type: number
                  reqnum:
                    type: integer
                  signature:
                    type: string
                    description: Router signature the worker validates before serving
                      the request.
                  status:
                    type: string
                    description: Set when no worker URL is returned (e.g. "endpoint
                      stopped").
        '400':
          description: "Bad request \u2014 missing/invalid parameters (response body\
            \ contains an `error_msg` string)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_msg:
                    type: string
  /api/v0/asks/{id}/:
    put:
      summary: Create Instance from Offer
      tags:
      - Instances
      description: Creates a new instance by accepting a host's offer (ask) identified
        by the given ID.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 4.5
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the offer to accept (ask_id)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image:
                  type: string
                  default: vastai/base-image:@vastai-automatic-tag
                  description: 'Docker image to use for the instance.

                    '
                template_hash_id:
                  type: string
                  description: 'Content-based hash ID of a template to use as base
                    configuration. Template values are merged with or overridden by
                    request parameters (see precedence rules in endpoint description).
                    When using a template, the `image` field is optional as the template
                    provides it.


                    Example: `4e17788f74f075dd9aab7d0d4427968f`

                    '
                label:
                  type: string
                  description: Custom name for the instance
                disk:
                  type: number
                  format: float
                  description: 'Size of local disk partition (in GB)

                    '
                runtype:
                  type: string
                  description: 'Launch mode for the instance. If omitted, defaults
                    to ''ssh'' unless `args/args_str` is provided.

                    '
                  enum:
                  - ssh
                  - jupyter
                  - args
                  - ssh_proxy
                  - ssh_direct
                  - jupyter_proxy
                  - jupyter_direct
                target_state:
                  type: string
                  description: 'Desired initial state of the instance

                    '
                  enum:
                  - running
                  - stopped
                price:
                  type: number
                  description: Bid price per machine (in $/hour). Only for interruptible
                    instances
                  minimum: 0.001
                  maximum: 128.0
                env:
                  type: string
                  description: 'Environment variables and port mappings in Docker
                    flag format. When using a template, request `env` is merged with
                    template `env` - existing keys are retained, new keys are appended,
                    conflicting keys use the request value.


                    Example: `"-e HF_TOKEN=hf_xxx123456789 -e MODEL_ID=TheBloke/Llama-2-7B-Chat-GPTQ
                    -p 8000:8000"`

                    '
                cancel_unavail:
                  type: boolean
                  description: Whether to cancel if instance cannot start immediately.
                    Defaults to false for interruptibles. Defaults to true for on-demand
                    with target_state='running'
                vm:
                  type: boolean
                  description: Whether this is a VM instance
                onstart:
                  type: string
                  description: "Commands to run when instance starts\n\nExample :\
                    \ `env | grep _ >> /etc/environment; echo 'starting up'` \n"
                args:
                  type: array
                  items:
                    type: string
                  description: 'Arguments array to passed to the image entrypoint


                    Example : `["bash", "-c", "env | grep _ >> /etc/environment; echo
                    ''starting up''"]`

                    '
                args_str:
                  type: string
                  description: 'Arguments string to pass to the entrypoint (alternative
                    to args)


                    Example : `args_str: bash -c "env | grep _ >> /etc/environment;
                    echo ''starting up''"`

                    '
                use_jupyter_lab:
                  type: boolean
                  description: Launch instance with jupyter lab instead of notebook
                jupyter_dir:
                  type: string
                  description: 'Directory to launch Jupyter from


                    Example : `/home/notebooks`

                    '
                python_utf8:
                  type: boolean
                  description: Set python's locale to C.UTF-8
                lang_utf8:
                  type: boolean
                  description: Set locale to C.UTF-8
                force:
                  type: boolean
                  description: Skip sanity checks when creating from an existing instance
                user:
                  type: string
                  description: User to use with docker create (breaks some images,
                    use with caution)
                image_login:
                  type: string
                  description: Docker registry credentials if needed
                volume_info:
                  type: object
                  description: Volume creation/linking information
                  properties:
                    create_new:
                      type: boolean
                      description: Set to `true` to create a new volume, `false` to
                        link an existing volume
                    volume_id:
                      type: integer
                      description: 'If `create_new` is false: existing volume ID (from
                        `show volumes`). If `create_new` is true: volume offer ID
                        (from `search volumes`)

                        '
                    size:
                      type: integer
                      description: Size of the volume in GB. Only used when `create_new`
                        is true
                    mount_path:
                      type: string
                      description: Mount path for the volume inside the container
                        (e.g., `/workspace`)
              required:
              - image
            example:
              image: vastai/base-image:@vastai-automatic-tag
      responses:
        '200':
          description: 'Returns {success: <bool>, new_contract: <contract_id>, instance_api_key:
            <key>}; success is true if the container started running, false if it
            started in stopped state.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when the container reached running state
                  new_contract:
                    type: integer
                    description: New instance contract ID
                  instance_api_key:
                    type: string
                    description: API key scoped to this instance
              example:
                success: true
                new_contract: 5678
                instance_api_key: abc123xyz
        '400':
          description: 'Returns {success: false, error: "invalid_args"} for missing/invalid
            id, bad params, runtype+use_ssh conflict, blacklisted host, or billing
            issues; includes specific messages like "''id'' is required and must be
            a valid offer ID", "runtype and use_ssh cannot both be set", "no_ssh_key_for_vm".'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Returns {success: false, error: "no_such_ask", msg: "No ask
            by id {id} is available."} when the offer is not found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: 'Returns {success: false, error: "no_such_ask", msg: "Instance
            type {id} is no longer available."} when the offer existed but resources
            are unavailable and cancel_unavail is set.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/bundles_bid_price/{id}/:
    put:
      summary: Get Bundle Bid Price
      tags:
      - Search
      description: Returns the recommended bid price for the best available ask in
        the specified bundle.
      security:
      - BearerAuth: []
      x-rateLimit: 0.8
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Bundle ID to look up the best ask bid price for.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
                  description: Optional requested bid price; if omitted the handler
                    computes from the best ask.
                max_start:
                  type: number
                  description: Relative seconds from now; filters asks to those starting
                    within this window.
                min_duration:
                  type: number
                  description: Minimum remaining duration in seconds; filters asks
                    to those meeting this threshold.
      responses:
        '200':
          description: 'Successful response: numeric bid price'
          content:
            application/json:
              schema:
                type: number
                description: Recommended bid price in dollars
              example: 0.42
        '404':
          description: 'Offer not found: {"success": false, "error": "no_such_ask",
            "msg": "Offer {bundle_id} does not exist or is not available."}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/bundles/{id}/:
    put:
      summary: Accept Bundle Offer
      tags:
      - Instances
      security:
      - BearerAuth: []
      x-rateLimit: 2.4
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Bundle ID identifying the group of asks to accept from.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
                  description: Bid price override; if omitted the handler auto-computes
                    a price from the best ask.
                max_start:
                  type: number
                  description: Relative seconds from now; filters asks to those starting
                    within this window.
                min_duration:
                  type: number
                  description: Minimum remaining duration in seconds; filters asks
                    to those meeting this threshold.
      responses:
        '200':
          description: Returns empty object (endpoint is currently disabled)
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example: {}
        '404':
          description: 'Offer not found: "Offer {bundle_id} does not exist or is not
            available."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/commands/transfer_credit/:
    put:
      summary: Transfer Credit to User
      tags:
      - Accounts
      description: Transfers a specified credit amount from the authenticated user's
        account to another user identified by email or user ID.
      security:
      - BearerAuth: []
      x-scope: billing_write
      x-rateLimit: 2.5
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                recipient:
                  type: string
                  description: Email address or user ID of the recipient
                  example: user@example.com
                amount:
                  type: number
                  format: float
                  description: Amount of credits to transfer (must be positive)
                  minimum: 0.01
                  example: 100.0
                client_id:
                  type: string
                  description: Client identifier (usually "me")
                  example: me
              required:
              - recipient
              - amount
      responses:
        '200':
          description: 'Success: returns {"success": true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
              example:
                success: true
        '400':
          description: 'Bad request: "The amount to transfer cannot be zero or negative",
            "Amount cannot have more than 2 decimal places", "Invalid recipient email
            format", "Invalid recipient", "You cannot transfer credit to yourself",
            "Team accounts can only transfer credit back to the team owner", "You
            lack the credit balance to perform that operation", "User not found",
            or invalid args'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 'Unauthorized: "Authorization Error. Please check your email
            for a confirmation link and try again" (email confirmation required)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/accept-price-increase/:
    put:
      summary: Accept Instance Price Increase
      tags:
      - Instances
      description: Accepts a pending price-increase offer for an instance, updating
        the contract to the new bid price.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pending_price_increase_id:
                  type: integer
                  description: ID of the pending price increase record to accept.
                  example: 789
      responses:
        '200':
          description: 'Returns result object including {success: true, contract_id}
            on acceptance.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when accepted
                  pending_price_increase_id:
                    type: integer
                    description: ID of the pending price increase record
                  contract_id:
                    type: integer
                    description: ID of the affected instance contract
              example:
                success: true
                pending_price_increase_id: 42
                contract_id: 1234
        '400':
          description: Returns error if the pending_price_increase_id is invalid or
            the increase cannot be accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthenticated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/bid_price/{id}/:
    put:
      summary: Change Instance Bid Price
      tags:
      - Instances
      description: Updates the bid price for an interruptible instance contract.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 5.5
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Instance ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: Client identifier (usually "me")
                  example: me
                price:
                  type: number
                  description: Bid price in $/hour
                  minimum: 0.001
                  maximum: 32.0
                  example: 0.17
              required:
              - client_id
              - price
      responses:
        '200':
          description: 'Returns {success: true} when the bid price is updated successfully.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when updated
              example:
                success: true
        '400':
          description: 'Returns {error: "invalid_args", msg: "Can''t change price
            of on-demand contract."}, {error: "invalid_args", msg: "Please set a bid
            price >= 0.001."}, {success: false, msg: "Could not find contract."},
            or {success: false, msg: "Could not find machine."}.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Returns {success: false, error: "no_such_instance", msg: "Instance
            with that ID does not exist."} with status 404.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/command/{id}/:
    put:
      summary: Execute Instance Command
      tags:
      - Instances
      description: Runs a whitelisted command on a stopped instance's container and
        returns a URL where the output can be retrieved.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 1.5
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the instance to execute command on
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  description: Command to execute on the instance
                  example: ls -l
      responses:
        '200':
          description: 'Returns {success: true, writeable_path, result_url, msg: "Command
            is executing, wait a few seconds and then view the result_url"}.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when command was queued
                  writeable_path:
                    type: string
                    description: Filesystem path writable by the container
                  result_url:
                    type: string
                    description: URL to poll for command output
                  msg:
                    type: string
                    description: Human-readable status message
        '400':
          description: 'Returns {error: "invalid_args"} with messages such as "Missing
            instance ID", "Invalid instance_id.", "Missing command.", "Invalid command.",
            "Invalid command given.", "Container not ready", "Execute command only
            avail on stopped instances. Use ssh to run commands on running instances.",
            or "VM instances do not support this operation."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Returns {error: "not_found", msg: "Instance not found."} when
            the instance doesn''t exist for the user.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/prepay/{id}/:
