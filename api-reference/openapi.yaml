          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when recycle was initiated
                  error:
                    type: string
                    description: Error code if success is false
                  msg:
                    type: string
                    description: Human-readable message
              example:
                success: true
  /api/v0/instances/reject-price-increase/:
    put:
      summary: Reject Instance Price Increase
