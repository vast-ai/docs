            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/update_template/{id}/:
    put:
      summary: Update Instance Template
      tags:
      - Instances
      description: Updates the image, environment, or template associated with an
        existing instance, optionally recycling it immediately.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Instance contract ID whose template to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                template_id:
                  type: integer
                  description: Numeric ID of an existing template to apply to the
                    instance.
                  example: 99
                template_hash_id:
                  type: string
                  description: Hash ID of an existing template to apply; takes precedence
                    over template_id.
                  example: abc123def456
                image:
                  type: string
                  description: Docker image reference to set on the instance.
                  example: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
                onstart:
                  type: string
                  description: Shell script to run when the instance starts.
                  example: pip install mypackage
