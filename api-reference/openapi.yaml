                    description: True when update succeeded
              example:
                success: true
        '400':
          description: 'Returns {success: false, error: "missing_id", msg: "Instance
            ID is required"} when id is absent.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Returns {success: false, error: "not_found", msg: "Instance
            not found or you don''t have permission to modify it"} when the instance
            doesn''t exist for the user.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/launch_instance/:
    put:
      summary: Launch Instance
      tags:
      - Instances
      description: Takes instance type and launch info, searches for a matching offer,
        and creates an instance from the first result.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      responses:
        '200':
          description: 'Offer not found during acceptance: {"success": false, "error":
            "offer_not_found", "message": ...}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the instance was created
                  new_contract:
                    type: integer
                    description: ID of the newly created instance/contract
  /api/v0/machines/create_asks/:
    put:
      summary: List Machine GPU Offers
      tags:
      - Machines
      description: Creates or updates ask (offer) contracts for one or more of the
        host's machines, making GPUs available for rent.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 5
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine:
                  type: integer
                  description: ID of the machine to list
                price_gpu:
                  type: number
                  format: float
                  description: Price per GPU per hour
                price_disk:
                  type: number
                  format: float
                  description: Price per GB of disk storage
                price_inetu:
                  type: number
                  format: float
                  description: Price per GB of upload bandwidth
                price_inetd:
                  type: number
                  format: float
                  description: Price per GB of download bandwidth
                price_min_bid:
                  type: number
                  format: float
                  description: Minimum bid price allowed
                min_chunk:
                  type: integer
                  description: Minimum number of GPUs that must be rented together
                  default: 1
                end_date:
                  type: number
                  format: float
                  description: Unix timestamp for when the listing expires
                credit_discount_max:
                  type: number
                  format: float
                  description: Maximum discount rate allowed for prepaid credits
                hidden_listing:
                  type: boolean
                  description: When true the offers are created but not shown publicly
                    in search results.
                  example: false
                machines:
                  type: array
                  description: List of machine IDs to list simultaneously; overrides
                    the singular `machine` field when provided.
                  example:
                  - 12345
                  - 67890
              required:
              - machine
      responses:
        '200':
          description: Returns {success, you_sent, results} with per-machine results
            from create_asks_
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether all per-machine ask operations succeeded
                  you_sent:
                    type: object
                    description: Echo of the request body
                  results:
                    type: array
                    items:
                      type: object
                    description: Per-machine result objects from the ask-creation
                      process
              example:
                success: true
                you_sent:
                  machine: 12345
                  price: 0.25
                results:
                - success: true
        '400':
          description: 'Invalid machine id or min_chunk: "Invalid machine id or min_chunk";
            or machine not found: "No such machine(s) for your account"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: 'Caller is not the machine owner: "Only the owner can create
            ask contracts for a machine."; or machine is decommissioned/locked: "Machines
            {ids} are decommissioned or locked for migration"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/create_bids/:
    put:
      summary: Create Host Background Jobs
      tags:
      - Machines
      description: Creates host-owned background (bid) container jobs on a specified
        machine, replacing any existing host default jobs.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 2.8
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine:
                  type: integer
                  description: ID of the machine to create jobs for.
                  example: 12345
                price_gpu:
                  type: number
                  format: float
                  description: Price per GPU per day.
                  example: 0.5
                price_inetu:
                  type: number
                  format: float
                  description: Price for internet upload.
                  example: 0.1
                price_inetd:
                  type: number
                  format: float
                  description: Price for internet download.
                  example: 0.1
                image:
                  type: string
                  description: Docker image to use for the job.
                  example: vastai/tensorflow
                args:
                  type: array
                  items:
                    type: string
                  description: Arguments for the Docker image.
                  example:
                  - --arg1
                  - --arg2
                args_str:
                  type: string
                  description: Command-line arguments as a single shell-quoted string
                    (parsed via shlex). Mutually exclusive with args.
                  example: --train --epochs 10
                use_ssh:
                  type: boolean
                  description: Whether to enable SSH access on the created background
                    job containers.
                  example: false
                onstart:
                  type: string
                  description: Shell command to run when the container starts.
                  example: bash /start.sh
                env:
                  type: object
                  description: Key-value pairs of environment variables to inject
                    into the container.
                  example:
                    MY_VAR: value
              required:
              - machine
              - price_gpu
              - price_inetu
              - price_inetd
              - image
      responses:
        '200':
          description: 'Returns {success: false, msg: "only the owner can create default
            bid contracts for a machine."} if not machine owner (no HTTP error code
            set)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the operation succeeded
                  machine_id:
                    type: integer
                    description: ID of the machine on which bids were created
                  user_id:
                    type: integer
                    description: ID of the authenticated user
                  you_sent:
                    type: object
                    description: Echo of the request body
              example:
                success: true
                machine_id: 12345
                user_id: 9876
                you_sent:
                  machine: 12345
                  image: pytorch/pytorch:latest
        '400':
          description: Missing or invalid machine_id ("Missing or invalid machine
            id, must be integer"), invalid image ("Missing or invalid image, must
            be string"), or conflicting args ("Please only use args or args_str")
            or invalid shlex params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/defrag_offers/:
    put:
      summary: Defragment Machine GPU Offers
      tags:
      - Machines
      description: Recomputes and defragments GPU contract assignments for specified
        machines to consolidate offer slots.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 2.8
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine_ids:
                  type: array
                  description: List of machine IDs whose GPU offer assignments should
                    be recomputed. Accepts an integer, a comma-separated string, or
                    a JSON array of integers.
                  example:
                  - 12345
                  - 67890
      responses:
        '200':
          description: 'Returns {success: true, defragmented: [...], n0, n1, n2} on
            success, or {success: false, defragmented: null} if no valid machine_ids
            provided'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether defragmentation was performed
                  defragmented:
                    type: array
                    items:
                      type: integer
                    description: List of machine IDs that were defragmented
                  n0:
                    type: integer
                    description: Count metric from recompute operation
                  n1:
                    type: integer
                    description: Count metric from recompute operation
                  n2:
                    type: integer
                    description: Count metric from recompute operation
              example:
                success: true
                defragmented:
                - 12345
                - 12346
                n0: 4
                n1: 2
                n2: 0
        '400':
          description: 'Invalid machine_ids value: "machine_ids must be integers"
            or "machine_ids must be comma-separated integers" or "machine_ids must
            be a list of integers or comma-separated string"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: '"Invalid/unauthorized machine_ids" when provided machine_ids
            do not belong to the authenticated user'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/{machine_id}/cancel_maint:
    put:
      summary: Cancel Machine Maintenance
      tags:
      - Machines
      description: Cancels all scheduled (non-expired) maintenance windows for the
        specified machine owned by the caller.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 2.5
      parameters:
      - name: machine_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the machine (from the URL path) whose scheduled maintenance
          windows should all be cancelled; must be owned by the authenticated user.
      responses:
        '200':
          description: '{success: true, ctime, machine_id, msg: "deleted N scheduled
            maintenance window(s) on machine {machine_id}"} on success.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true on successful cancellation
                  ctime:
                    type: number
                    description: Unix timestamp when the cancellation was performed
                  machine_id:
                    type: integer
                    description: ID of the machine whose maintenances were cancelled
                  msg:
                    type: string
                    description: Human-readable summary of how many windows were cancelled
              example:
                success: true
                ctime: 1750000000
                machine_id: 1001
                msg: deleted 2 scheduled maintenance window(s) on machine 1001
        '404':
          description: '{success: false, msg: "No such machine id"} when the machine
            does not exist or is not owned by the caller.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/{machine_id}/cleanup:
    put:
      summary: Cleanup Machine Expired Contracts
      tags:
      - Machines
      description: Sends a volume cleanup task to the machine daemon and soft-deletes
        expired client contracts on the machine.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 8
      parameters:
      - name: machine_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the machine on which expired contracts should be cleaned
          up.
      responses:
        '200':
          description: 'Returns {success: true, ctime, machine_id, user_id, num_deleted,
            msg} when contracts were deleted; {success: false, msg: "No expired contracts
            to delete"} when nothing to clean'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether any contracts were deleted
                  ctime:
                    type: number
                    description: Unix timestamp when cleanup ran
                  machine_id:
                    type: integer
                    description: ID of the cleaned machine
                  user_id:
                    type: integer
                    description: ID of the authenticated user
                  num_deleted:
                    type: integer
                    description: Number of expired contracts removed
                  msg:
                    type: string
                    description: Human-readable summary of the operation
              example:
                success: true
                ctime: 1718000000
                machine_id: 12345
                user_id: 9876
                num_deleted: 5
                msg: deleted 5 expired contracts on machine 12345
        '400':
          description: '"Invalid machine_id" if machine_id is None'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"No such machine id" when the machine does not exist'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: '"error: only the owner can access this machine."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/{machine_id}/dnotify:
    put:
      summary: Schedule Machine Maintenance
      tags:
      - Machines
      description: Schedules a maintenance window for a single machine and sends downtime
        warning emails to affected instance clients and a confirmation to the host.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 2.5
      parameters:
      - name: machine_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the machine to schedule maintenance for.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sdate:
                  type: string
                  format: date-time
                  description: Start date and time of the maintenance window.
                  example: '2023-10-30T14:00:00Z'
                duration:
                  type: integer
                  description: Duration of the maintenance window in hours.
                  example: 2
                maintenance_reason:
                  type: string
                  description: Reason for the maintenance.
                  example: Routine hardware check
                maintenance_category:
                  type: string
                  description: Category of the maintenance.
                  enum:
                  - power
                  - internet
                  - disk
                  - gpu
                  - software
                  - other
                  example: software
              required:
              - sdate
              - duration
      responses:
        '200':
          description: '{success: true, machine_id, notifications_sent, you_sent:
            "N notifications sent"} on success.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true on success
                  machine_id:
                    type: integer
                    description: ID of the machine scheduled for maintenance
                  notifications_sent:
                    type: integer
                    description: Number of client notification emails sent
                  you_sent:
                    type: string
                    description: Human-readable summary of notifications sent
              example:
                success: true
                machine_id: 1001
                notifications_sent: 3
                you_sent: 3 notifications sent
        '400':
          description: '"maintenance_category can only be one of (power, internet,
            disk, gpu, software, other)" for invalid category, "Missing machine_id"
            when machine_id is unparseable, or "duration must be a positive number"
            when duration is invalid.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"No such machine id" when the machine does not exist or is
            not owned by the caller.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: '"Missing sdate" when the sdate parameter is not provided.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/{machine_id}/minbid:
    put:
      summary: Set Machine Minimum Bid Price
      tags:
      - Machines
      description: Updates the minimum interruptible bid price for a machine owned
        by the authenticated host.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 1.5
      parameters:
      - name: machine_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the machine whose minimum bid price should be updated.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
                  description: Minimum bid price for the machine.
                  example: 0.5
      responses:
        '200':
          description: 'Returns {success: true, you_sent} on success'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the price was updated
                  you_sent:
                    type: object
                    description: Echo of the request body
              example:
                success: true
                you_sent:
                  price: 0.15
        '422':
          description: 'Machine not found: "No such machine id"; missing price argument:
            "Missing argument: min_bid."; non-numeric price: "min_bid must be a number.";
            price <= 0: "min_bid must be greater than 0."; price exceeds max: "min_bid
            must be <= {max} (2 * 0.1 * gpu_tflops)."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: '"error: only the owner can set a min bid price for a machine."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/{machine_id}/report:
    put:
      summary: Report Machine Problem
      tags:
      - Machines
      description: Submits a problem report for a machine on which the authenticated
        user has an active instance, and notifies the machine owner.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit:
        threshold: 1.2
        redis_rate_limit_enabled: true
      parameters:
      - name: machine_id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the machine being reported; must match the URL
          path segment.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Optional free-text description of the issue, truncated
                    to 512 characters.
                  example: GPU utilization never exceeded 20% despite benchmark workload.
                instance_id:
                  type: integer
                  description: ID of the caller's active instance on this machine,
                    used to verify the caller is a current tenant.
                  example: 67890
                problem:
                  type: string
                  description: Category of problem being reported.
                  enum:
                  - Unable To Start Instance
                  - Instance Takes Too Long To Load
                  - Instance Has Less Disk Space Than Requested
                  - Machine Has Port Issues
                  - Machine Performance Is Less Than Expected
                  - Other
      responses:
        '200':
          description: 'Report submitted successfully; returns {"success": true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                required:
                - success
              example:
                success: true
        '400':
          description: 'Missing or invalid parameters: machine_id/instance_id not
            valid integers ("machine_id and instance_id must both be valid integers"),
            invalid problem category ("Problem must be one of: ..."), or report insertion
            failed ({"success": false})'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User does not have an active instance on the specified machine
            ("You can only report machines on which you have an active instance")
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/subaccounts/regenerate_keys/:
    put:
      summary: Regenerate Subaccount Keys
      tags:
      - Accounts
      description: Regenerate API keys for one specific subaccount or all subaccounts
        owned by the authenticated user.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subaccount_user_id:
                  type: integer
                  description: ID of the specific subaccount whose key should be regenerated;
                    mutually exclusive with regenerate_all
                  example: 56789
                regenerate_all:
                  type: boolean
                  description: If true, regenerate keys for all subaccounts by rotating
                    the owner seed; mutually exclusive with subaccount_user_id
      responses:
        '200':
          description: 'Keys regenerated: {"success": true, "regenerated_keys": [{"user_id":
            ..., "email": ..., "derived_key": ...}]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  regenerated_keys:
                    type: array
                    description: One entry per regenerated subaccount
                    items:
                      type: object
                      properties:
                        user_id:
                          type: integer
                          description: Subaccount user ID
                        email:
                          type: string
                          description: Subaccount email
                        derived_key:
                          type: string
                          description: New derived API key value
              example:
                success: true
                regenerated_keys:
                - user_id: 456
                  email: sub@example.com
                  derived_key: abc123...
        '400':
          description: 'Invalid params: "Must specify subaccount_user_id or regenerate_all"
            or "subaccount_user_id must be a valid integer"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: 'Account not subaccount-approved: "Only subaccount approved
            accounts may use this API"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Subaccount not found: "Subaccount not found" or "Active subaccount
            key not found to regenerate"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/team/transfer/:
    put:
      summary: Transfer Team Ownership
      tags:
      - Team
      description: Transfers ownership of the current team to another existing team
        member who holds a manager role.
      security:
      - BearerAuth: []
      x-scope: team_write
      x-rateLimit: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                new_team_owner_id:
