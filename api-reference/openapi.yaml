      - Accounts
      description: Saves one or more templates to the authenticated user's library,
        creating new template records or linking existing ones as appropriate.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 1.9
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the user saving templates (URL path parameter)
      requestBody:
        content:
          application/json:
            schema:
              type: object
