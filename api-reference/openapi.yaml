  /api/v0/metrics/gpu/current/:
    get:
      summary: Get Current GPU Supply Snapshot
      tags:
      - Machines
      description: Returns a current point-in-time snapshot of all GPU types with
        counts, utilization, and pricing percentiles.
      security:
      - BearerAuth: []
      x-scope: machine_read
      x-rateLimit: 2.0
      parameters:
      - name: verified
        in: query
        required: false
        description: Filter by verification status
        schema:
          type: string
          enum:
          - 'yes'
          - 'no'
          - all
          default: 'yes'
      - name: hosting_type
        in: query
        required: false
        description: Filter by hosting type
        schema:
          type: string
          enum:
          - all
          - secure_cloud
          - community
          default: all
      - name: num_gpus
        in: query
        required: false
        description: GPU count bucket or "all" for true population
        schema:
          type: string
          default: all
      responses:
        '200':
          description: 'Success. Returns `{success: true, gpus: [{gpu_name, total,
            available, rented_verified, avail_verified, rented_unverified, avail_unverified,
            usage, usage_30d, dlperf, tflops, price_p10, price_p25, price_median,
            price_p75, price_p90, tflops_per_dollar, dlperf_per_dollar}]}`. If the
            user is a host with no active machines, returns `{success: true, gpus:
            [], needs_machine: true}`.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  needs_machine:
                    type: boolean
                    description: True when the caller is a host with no active machines;
                      gpus will be empty
                  gpus:
                    type: array
                    description: One entry per GPU type with >= 10 total GPUs, sorted
                      by total descending
                    items:
                      type: object
                      properties:
                        gpu_name:
                          type: string
                          description: GPU model name, e.g. 'RTX 4090'
                        total:
                          type: integer
                          description: Total machine/rig count
                        available:
                          type: integer
                          description: Available (unrented) machine count
                        rented_verified:
                          type: integer
                          description: Rented verified machine count
                        avail_verified:
                          type: integer
                          description: Available verified machine count
                        rented_unverified:
                          type: integer
                          description: Rented unverified machine count
                        avail_unverified:
                          type: integer
                          description: Available unverified machine count
                        total_gpus:
                          type: integer
                          description: Raw total GPU count
                        available_gpus:
                          type: integer
                          description: Raw available GPU count
                        rented_verified_gpus:
                          type: integer
                          description: Raw rented verified GPU count
                        avail_verified_gpus:
                          type: integer
                          description: Raw available verified GPU count
                        rented_unverified_gpus:
                          type: integer
                          description: Raw rented unverified GPU count
                        avail_unverified_gpus:
                          type: integer
                          description: Raw available unverified GPU count
                        bucket_size:
                          type: integer
                          description: GPUs per rig for the queried num_gpus bucket;
                            1 when num_gpus=all
                        usage:
                          type: number
                          description: Current utilization percentage (0-100)
                        usage_30d:
                          type: number
                          description: 30-day average utilization percentage
                        dlperf:
                          type: number
                          description: 90th-percentile deep-learning performance score
                        tflops:
                          type: number
                          description: 90th-percentile TFLOPS
                        price_p10:
                          type: number
                          description: 10th-percentile rental price per GPU-hour
                        price_p25:
                          type: number
                          description: 25th-percentile rental price per GPU-hour
                        price_median:
                          type: number
                          description: Median rental price per GPU-hour
                        price_p75:
                          type: number
                          description: 75th-percentile rental price per GPU-hour
                        price_p90:
                          type: number
                          description: 90th-percentile rental price per GPU-hour
                        tflops_per_dollar:
                          type: number
                          description: TFLOPS divided by median price (performance/dollar)
                        dlperf_per_dollar:
                          type: number
                          description: DL performance divided by median price
              example:
                success: true
                gpus:
                - gpu_name: RTX 4090
                  total: 1200
                  available: 400
                  rented_verified: 650
                  avail_verified: 300
                  rented_unverified: 150
                  avail_unverified: 100
                  total_gpus: 1200
                  available_gpus: 400
                  rented_verified_gpus: 650
                  avail_verified_gpus: 300
                  rented_unverified_gpus: 150
                  avail_unverified_gpus: 100
                  bucket_size: 1
                  usage: 66.7
                  usage_30d: 64.2
                  dlperf: 72.3
                  tflops: 82.6
                  price_p10: 0.29
                  price_p25: 0.35
                  price_median: 0.45
                  price_p75: 0.59
                  price_p90: 0.74
                  tflops_per_dollar: 183.6
                  dlperf_per_dollar: 160.7
        '400':
          description: Invalid query parameter. "verified must be 'yes', 'no', or
            'all'" or "hosting_type must be 'all', 'secure_cloud', or 'community'"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: 'Caller is not a host or admin: "Host or admin access required"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/metrics/gpu/history/:
    get:
      summary: Get GPU Supply and Pricing History
      tags:
      - Machines
      description: Returns time-series supply/demand, pricing percentiles, and performance
        stats for one or more GPU types over a specified time range.
      security:
      - BearerAuth: []
      x-scope: machine_read
      x-rateLimit: 2.0
      parameters:
      - name: gpu_name
        in: query
        required: false
        description: Comma-separated GPU names (e.g. "RTX 4090, H100_SXM") or "all".
          Defaults to RTX 5090, 4090, and 3090.
        schema:
          type: string
          example: RTX 4090
      - name: verified
        in: query
        required: false
        description: Filter by verification status
        schema:
          type: string
          enum:
          - 'yes'
          - 'no'
          - all
          default: 'yes'
      - name: hosting_type
        in: query
        required: false
        description: Filter by hosting type
        schema:
          type: string
          enum:
          - all
          - secure_cloud
          - community
          default: all
      - name: num_gpus
        in: query
        required: false
        description: GPU count bucket or "all"
        schema:
          type: string
          default: all
      - name: start
        in: query
        required: false
        description: Unix timestamp for range start
        schema:
          type: integer
      - name: end
        in: query
        required: false
        description: Unix timestamp for range end
        schema:
          type: integer
      - name: step
        in: query
        required: false
        description: Seconds between data points (e.g. 3600 for hourly)
        schema:
          type: integer
      responses:
        '200':
          description: 'Success. Returns `{success: true, gpus: {<gpu_name>: {supply_demand:
            {timestamps, rented_verified, avail_verified, rented_unverified, avail_unverified,
            total}, pricing: {timestamps, rented_p10, rented_median, rented_p90, avail_p10,
            avail_median, avail_p90}, stats: {tflops, dlperf, tflops_per_dollar, dlperf_per_dollar}}}}`.
            Returns `needs_machine: true` with empty gpus if host has no active machines.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  needs_machine:
                    type: boolean
                    description: True when caller is a host with no active machines;
                      gpus will be empty
                  gpus:
                    type: object
                    description: Map of GPU name to its time-series data
                    additionalProperties:
                      type: object
                      properties:
                        supply_demand:
                          type: object
                          description: Time-series availability counts
                          properties:
                            timestamps:
                              type: array
                              items:
                                type: integer
                              description: Unix epoch timestamps for each data point
                            bucket_size:
                              type: integer
                              description: GPUs per rig for bucketed queries; 1 when
                                num_gpus=all
                            total:
                              type: array
                              items:
                                type: integer
                              description: Total machine count per timestamp
                            available:
                              type: array
                              items:
                                type: integer
                              description: Available machine count (alias for avail_verified+avail_unverified)
                            rented_verified:
                              type: array
                              items:
                                type: integer
                              description: Rented verified machine count per timestamp
                            avail_verified:
                              type: array
                              items:
                                type: integer
                              description: Available verified machine count per timestamp
                            rented_unverified:
                              type: array
                              items:
                                type: integer
                              description: Rented unverified machine count per timestamp
                            avail_unverified:
                              type: array
                              items:
                                type: integer
                              description: Available unverified machine count per
                                timestamp
                            total_gpus:
                              type: array
                              items:
                                type: integer
                              description: Raw total GPU count per timestamp
                            rented_verified_gpus:
                              type: array
                              items:
                                type: integer
                              description: Raw rented verified GPU count per timestamp
                            avail_verified_gpus:
                              type: array
                              items:
                                type: integer
                              description: Raw available verified GPU count per timestamp
                            rented_unverified_gpus:
                              type: array
                              items:
                                type: integer
                              description: Raw rented unverified GPU count per timestamp
                            avail_unverified_gpus:
                              type: array
                              items:
                                type: integer
                              description: Raw available unverified GPU count per
                                timestamp
                        pricing:
                          type: object
                          description: Time-series price percentiles per GPU-hour
                          properties:
                            timestamps:
                              type: array
                              items:
                                type: integer
                              description: Unix epoch timestamps
                            rented_p10:
                              type: array
                              items:
                                type: number
                              description: 10th-percentile price for rented GPUs
                            rented_median:
                              type: array
                              items:
                                type: number
                              description: Median price for rented GPUs
                            rented_p90:
                              type: array
                              items:
                                type: number
                              description: 90th-percentile price for rented GPUs
                            avail_p10:
                              type: array
                              items:
                                type: number
                              description: 10th-percentile price for available GPUs
                            avail_median:
                              type: array
                              items:
                                type: number
                              description: Median price for available GPUs
                            avail_p90:
                              type: array
                              items:
                                type: number
                              description: 90th-percentile price for available GPUs
                        stats:
                          type: object
                          description: Latest performance statistics
                          properties:
                            tflops:
                              type: number
                              description: Latest 90th-percentile TFLOPS
                            dlperf:
                              type: number
                              description: Latest 90th-percentile deep-learning performance
                                score
                            tflops_per_dollar:
                              type: number
                              description: TFLOPS per dollar at current median available
                                price
                            dlperf_per_dollar:
                              type: number
                              description: DL performance per dollar at current median
                                available price
        '400':
          description: 'Invalid or missing parameters. Possible messages: "gpu_name
            is required", "verified must be ''yes'', ''no'', or ''all''", "hosting_type
            must be ''all'', ''secure_cloud'', or ''community''", "start, end, and
            step must be integers", "start must be <= end"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: 'Caller is not a host or admin: "Host or admin access required"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/metrics/gpu/locations/:
    get:
      summary: Get GPU Machine Locations
      tags:
      - Machines
      description: Returns current geographic locations of GPU machines, grouped by
        coordinates, for use in a geo map dashboard.
      security:
      - BearerAuth: []
      x-scope: machine_read
      x-rateLimit: 2.0
      responses:
        '200':
          description: 'Success. Returns `{success: true, locations: [{latitude, longitude,
            city, country_code, gpu_name, rented, verified, datacenter, num_gpus}]}`.
            Returns `needs_machine: true` with empty locations if host has no active
            machines.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  needs_machine:
                    type: boolean
                    description: True when caller is a host with no active machines;
                      locations will be empty
                  locations:
                    type: array
                    description: One entry per distinct (lat, lon, gpu_name, rented,
                      verified, datacenter) combination
                    items:
                      type: object
                      properties:
                        latitude:
                          type: number
                          description: Latitude rounded to 4 decimal places
                        longitude:
                          type: number
                          description: Longitude rounded to 4 decimal places
                        city:
                          type: string
                          description: City name, or empty string if unknown
                        country_code:
                          type: string
                          description: ISO country code, or empty string if unknown
                        gpu_name:
                          type: string
                          description: GPU model name, or 'Unknown'
                        rented:
                          type: boolean
                          description: Whether this cluster of GPUs is currently rented
                        verified:
                          type: boolean
                          description: Whether these GPUs are verified
                        datacenter:
                          type: boolean
                          description: True if hosting_type indicates a secure cloud
                            / datacenter host
                        num_gpus:
                          type: integer
                          description: Number of GPUs at this location matching the
                            other attributes
              example:
                success: true
                locations:
                - latitude: 37.7749
                  longitude: -122.4194
                  city: San Francisco
                  country_code: US
                  gpu_name: RTX 4090
                  rented: false
                  verified: true
                  datacenter: true
                  num_gpus: 8
        '403':
          description: 'Caller is not a host or admin: "Host or admin access required"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
