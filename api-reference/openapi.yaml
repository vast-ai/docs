          type: integer
        description: User ID of the team member to assign the role to.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  description: Name of the role to assign; cannot be 'owner'.
                  example: developer
      responses:
        '200':
          description: '{"msg": "success"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    description: '"success" on successful assignment'
              example:
                msg: success
        '400':
          description: Cannot assign owner role; member already has a role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Only team accounts can update member roles; caller lacks permissions
            to assign higher role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Role not found; team member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update Team Member Role
      tags:
      - Team
      description: Replaces a team member's current role with a different existing
        team role.
      security:
      - BearerAuth: []
      x-scope: team_write
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the team member whose roles to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                member_id:
                  type: integer
                  description: User ID of the team member whose role should be changed.
                  example: 101
                role_id:
                  type: integer
                  description: ID of the new role to assign to the member.
                  example: 7
      responses:
        '200':
          description: '{"success": true, "msg": "User role updated successfully",
            "new_role_permissions": <permissions>}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: Human-readable confirmation message
                  new_role_permissions:
                    type: object
                    description: Permissions object for the newly assigned role
              example:
                success: true
                msg: User role updated successfully
                new_role_permissions: {}
        '400':
          description: Member already has this role; user has no roles; cannot update
