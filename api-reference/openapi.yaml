                    type: string
                    description: '"success" on successful removal'
                  message:
                    type: string
                    description: Human-readable confirmation message
              example:
                status: success
                message: User removed from the team.
        '400':
          description: '"Missing team member''s user id"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not in team context; cannot remove team owner; cannot remove
