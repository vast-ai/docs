      parameters:
      - name: machine_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the machine whose default host jobs should be deleted.
      responses:
        '200':
          description: 'Returns {success: true, machine_id, user_id}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the deletion succeeded
                  machine_id:
                    type: integer
                    description: ID of the affected machine
                  user_id:
                    type: integer
                    description: ID of the authenticated user
              example:
                success: true
                machine_id: 12345
                user_id: 9876
        '404':
          description: '"No such machine id" when the machine does not exist'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: '"error: only the owner can access this machine." when caller
            does not own the machine'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/maintenances:
    delete:
      summary: Delete Machine Maintenance Window
      tags:
      - Machines
      description: Cancels a single scheduled maintenance window by its ID, provided
        the caller owns the associated machine.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenance_id:
                  type: integer
                  description: ID of the maintenance record to cancel.
                  example: 42
      responses:
        '200':
          description: '{success: true, msg: "Maintenance cancelled"} when the record
            was successfully cancelled.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true when the record was cancelled
                  msg:
                    type: string
                    description: Human-readable result message
              example:
                success: true
                msg: Maintenance cancelled
        '400':
          description: '"Missing maintenance_id" when no maintenance_id is provided,
            or failure with the specific reason (e.g., "Maintenance record not found",
            "User is not the owner of the machine", "Maintenance not found or already
            cancelled").'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List Machine Maintenance Windows
      tags:
      - Machines
      description: Returns active (non-cancelled, non-expired) maintenance windows
        for host-owned machines identified by the provided machine_ids.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 2
      responses:
        '200':
          description: Array of active maintenance window objects, each including
            end_time computed from start_time and duration_hours.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Maintenance record ID
                    machine_id:
                      type: integer
                      description: ID of the machine this maintenance applies to
                    start_time:
                      type: number
                      description: Unix timestamp when maintenance begins
                    duration_hours:
                      type: integer
                      description: Duration of the maintenance window in hours
                    maintenance_category:
                      type: string
                      description: Category of maintenance (power, internet, disk,
                        gpu, software, other)
                    maintenance_reason:
                      type: string
                      description: Optional reason for maintenance
                    created_at:
                      type: number
                      description: Unix timestamp when the record was created
                    cancelled_at:
                      type: number
                      description: Unix timestamp when cancelled, or null if active
                    end_time:
                      type: number
                      description: Computed unix timestamp when maintenance ends (start_time
                        + duration_hours * 3600)
              example:
              - id: 42
                machine_id: 1001
                start_time: 1750000000
                duration_hours: 4
                maintenance_category: power
                maintenance_reason: null
                created_at: 1749990000
                cancelled_at: null
                end_time: 1750014400
        '400':
          description: '"machine_ids cannot be empty" when machine_ids param is missing
            or empty.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"machine_ids (...) do not exist" when no machines are found,
            or "only include machine_ids that exist and are owned by you" when none
            of the given IDs are owned by the caller.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Query Maintenance Windows by Machine IDs
      tags:
      - Machines
      description: Returns active maintenance windows for the specified list of machine
        IDs.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine_ids:
                  type: array
                  description: List of machine IDs (integers, comma-separated string,
                    or a single integer) to retrieve active maintenance windows for.
                  example:
                  - 12345
                  - 67890
                ctime:
                  type: number
                  description: Unix timestamp used as the reference 'current time'
                    for filtering out already-ended windows; defaults to server's
                    current time.
                  example: 1718000000
      responses:
        '200':
          description: 'Array of maintenance window objects with fields: id, machine_id,
            duration_hours, start_time, maintenance_category.'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Maintenance record ID
                    machine_id:
                      type: integer
                      description: ID of the machine
                    duration_hours:
                      type: integer
                      description: Duration of the maintenance window in hours
                    start_time:
                      type: number
                      description: Unix timestamp when maintenance begins
                    maintenance_category:
                      type: string
                      description: Category of maintenance (power, internet, disk,
                        gpu, software, other)
              example:
              - id: 42
                machine_id: 1001
                duration_hours: 2
                start_time: 1750000000
                maintenance_category: disk
        '400':
          description: '"input argument machine_ids can not be None" when machine_ids
            is missing or empty.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/machines/maintenances/batch:
    delete:
      summary: Batch Delete Maintenances
      tags:
      - Machines
      description: Cancels multiple scheduled maintenance windows by their IDs, skipping
        any the caller does not own.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenance_ids:
                  type: array
                  description: "List of maintenance record IDs (1\u2013100 entries)\
                    \ to cancel."
                  example:
                  - 1
                  - 2
                  - 3
      responses:
        '200':
          description: '{success: true, results: [{success, maintenance_id, msg},
            ...]} when at least one maintenance record was cancelled.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true if at least one record was cancelled
                  results:
                    type: array
                    description: Per-maintenance-ID outcome list
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                          description: Whether this record was cancelled
                        maintenance_id:
                          type: integer
                          description: Maintenance record ID
                        msg:
                          type: string
                          description: Human-readable outcome message
              example:
                success: true
                results:
                - success: true
                  maintenance_id: 42
                  msg: Maintenance record deleted
                - success: false
                  maintenance_id: 99
                  msg: Maintenance record not found
        '400':
          description: '"maintenance_ids must be a non-empty list", "maintenance_ids
            must contain at most 100 entries", or "No valid maintenance_ids provided"
            when input is invalid; also returned (with success:false and per-item
            results) when no deletions succeeded.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Batch Schedule Maintenances
      tags:
      - Machines
      description: Schedules maintenance windows for multiple machines at once, notifying
        affected instance clients and sending the host a single confirmation email.
      security:
      - BearerAuth: []
      x-scope: machine_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine_ids:
                  type: array
                  description: "List of machine IDs (1\u2013100 entries) to schedule\
                    \ maintenance for; non-owned IDs are reported as failures."
                  example:
                  - 12345
                  - 67890
                sdate:
                  type: number
                  description: Unix timestamp for the maintenance start time; must
                    be in the future and within 1 year.
                  example: 1718100000
                duration:
                  type: number
                  description: Duration of the maintenance window in hours; minimum
                    effective value is 1. Defaults to 1 if omitted.
                  example: 4
                maintenance_category:
                  type: string
                  description: Category describing the reason for maintenance. Defaults
                    to "other" if omitted.
                  example: power
                  enum:
                  - power
                  - internet
                  - disk
                  - gpu
                  - software
                  - other
      responses:
        '200':
          description: '{success: true, results: [{success, machine_id, notifications_sent},
            ...]} when at least one machine was successfully scheduled.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true if at least one machine was successfully scheduled
                  results:
                    type: array
                    description: Per-machine outcome list, including successes, not-found,
                      and invalid entries
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                          description: Whether this machine was scheduled
                        machine_id:
                          type: integer
                          description: Machine ID
                        notifications_sent:
                          type: integer
                          description: Number of client notification emails sent (present
                            on success)
                        error:
                          type: string
                          description: Error code if failed (e.g. not_found)
                        msg:
                          type: string
                          description: Human-readable message if failed
              example:
                success: true
                results:
                - success: true
                  machine_id: 1001
                  notifications_sent: 2
                - success: false
                  machine_id: 9999
                  error: not_found
                  msg: No such machine id or not owned
        '400':
          description: '"machine_ids must be a non-empty list", "machine_ids must
            contain at most 100 entries", "No valid machine_ids provided", "duration
            must be a positive number", or "maintenance_category must be one of: disk,
            gpu, internet, other, power, software" when input validation fails; also
            returned (with success:false) if no machines were owned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: '"Missing sdate", "sdate must be a numeric timestamp", "sdate
            must be in the future", or "sdate must be within 1 year" when the start
            time is invalid.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/secrets/:
    delete:
      summary: Delete User Secret
      tags:
      - Accounts
      description: Deletes an existing environment variable secret by key from the
        authenticated user's account.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 3
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                  description: Name of the environment variable to delete
                  example: MY_API_KEY
      responses:
        '200':
          description: 'Success: {"success": true, "msg": "Environment variable deleted
            successfully"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  msg:
                    type: string
                    description: Confirmation message
              example:
                success: true
                msg: Environment variable deleted successfully
        '400':
          description: 'Bad request: "''key'' required." or "Environment variable
            not found" (key does not exist)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List User Secrets
      tags:
      - Accounts
      description: Returns the authenticated user's environment variable secret keys
        with masked values.
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit: 5
      responses:
        '200':
          description: 'Success: {"success": true, "secrets": {key: "********", ...}}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  secrets:
                    type: object
                    description: Map of secret key names to "********" (masked) or
                      null
              example:
                success: true
                secrets:
                  MY_API_KEY: '********'
                  EMPTY_KEY: null
    post:
      summary: Add User Secret
      tags:
      - Accounts
      description: Adds one or more environment variable secrets to the authenticated
        user's account.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 3
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                  description: Environment variable key name (will be converted to
                    uppercase)
                  example: API_TOKEN
                value:
                  type: string
                  description: Secret value to be encrypted and stored
                  example: abc123xyz
                env_vars:
                  type: array
                  description: Array of {key, value} objects for adding multiple secrets
                    in a single request.
      responses:
        '200':
          description: 'Success: {"success": true, "msg": "Environment variables processed
            successfully"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  msg:
                    type: string
                    description: Confirmation message
              example:
                success: true
                msg: Environment variables processed successfully
        '400':
          description: 'Bad request: "Input must be a list", "Both ''key'' and ''value''
            are required for single env edits...", or max secrets limit exceeded:
            "User has reached the limit of 16 environment variables."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update User Secret
      tags:
      - Accounts
      description: Updates the value of an existing environment variable secret for
        the authenticated user.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 3
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                  description: The key of the environment variable to update (will
                    be converted to uppercase)
                  example: MY_API_KEY
                value:
                  type: string
                  description: New encrypted value to store for the secret.
                  example: newsecret456
      responses:
        '200':
          description: 'Success: {"success": true, "msg": "Environment variable updated
            successfully"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  msg:
                    type: string
                    description: Confirmation message
              example:
                success: true
                msg: Environment variable updated successfully
        '400':
          description: 'Bad request: "Both ''key'' and ''value'' are required.", or
            "Environment variable not found" (key does not exist)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/ssh/{id}/:
    delete:
      summary: Delete SSH Key
      tags:
      - Accounts
      description: Removes an SSH public key from the authenticated user's account
        by key ID.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the SSH key to delete
      responses:
        '200':
          description: 'Success: {"success": true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
              example:
                success: true
        '400':
          description: 'Bad request: {"success": false, "error": "no_ssh_key", "msg":
            "No ssh key provided"} (key not found or does not belong to user)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update SSH Key
      tags:
      - Accounts
      description: Replaces the public key value of an existing SSH key entry for
        the authenticated user.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the SSH key to update
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ssh_key:
                  type: string
                  description: The new value for the SSH key
                  example: ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC3...
      responses:
        '200':
          description: 'Success: {"success": true, "key": {ssh key object}}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  key:
                    type: object
                    description: The updated SSH key record
        '400':
          description: 'Bad request: "No ssh key provided" (missing id), "The SSH
            key already exists on this account" (duplicate), or retrieval failure'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Not found: {"success": false, "error": "not_found", "msg":
            "The SSH key does not exist on this account"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/team/:
    delete:
