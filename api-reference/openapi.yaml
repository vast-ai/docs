  /api/v0/webhooks/:
    get:
      summary: List User Webhooks
      tags:
      - Accounts
      description: List the authenticated user's webhook URLs.
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit: 2.0
      responses:
        '200':
          description: 'Success; returns {success: true, webhooks: list} where each
            webhook has id, user_id, name, webhook_url, event_types, created_at, updated_at'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  webhooks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Webhook ID.
                        user_id:
                          type: integer
                          description: Owning user ID.
                        name:
                          type: string
                          description: Optional display name.
                        webhook_url:
                          type: string
                          description: The HTTPS endpoint URL.
                        event_types:
                          type: array
                          items:
                            type: string
                          description: Subscribed event type slugs.
                        created_at:
                          type: number
                          description: Unix timestamp of creation.
                        updated_at:
                          type: number
                          description: Unix timestamp of last update.
                    description: List of the user's webhook registrations.
              example:
                success: true
                webhooks:
                - id: 42
                  user_id: 1001
                  name: My Webhook
                  webhook_url: https://example.com/vastai-events
                  event_types:
                  - low_disk_space
                  - near_end_date
                  created_at: 1700000000
                  updated_at: 1700000000
    post:
      summary: Create User Webhook
      tags:
      - Accounts
      description: Register a new webhook URL for the authenticated user, subscribing
        it to the specified event types.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url:
                  type: string
                  description: HTTPS URL to receive webhook event deliveries; must
                    start with 'https://', have a valid hostname, and be at most 2048
                    characters.
                  example: https://example.com/vastai-hook
                event_types:
                  type: array
                  description: List of notification slug strings (e.g. 'low_disk_space'
                    or 'host:low_disk_space') this webhook should receive; must be
                    non-empty and contain only known slugs.
                  example:
                  - low_disk_space
                  - near_end_date
                name:
                  type: string
                  description: Optional human-readable display label for this webhook
                    (max 120 characters, no control characters).
                  example: My integration
      responses:
        '200':
          description: 'Success; returns {success: true, webhook: object, enabled_notification_preferences:
            list}; webhook includes webhook_secret (shown once)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  webhook:
                    type: object
                    description: The created webhook object including id, user_id,
                      name, webhook_url, event_types, created_at, updated_at, and
                      the one-time webhook_secret.
                    properties:
                      id:
                        type: integer
                        description: Webhook ID.
                      user_id:
                        type: integer
                        description: Owning user ID.
                      name:
                        type: string
                        description: Optional display name.
                      webhook_url:
                        type: string
                        description: The registered HTTPS endpoint URL.
                      event_types:
                        type: array
                        items:
                          type: string
                        description: Subscribed event type slugs.
                      created_at:
                        type: number
                        description: Unix timestamp of creation.
                      updated_at:
                        type: number
                        description: Unix timestamp of last update.
                      webhook_secret:
                        type: string
                        description: Signing secret for verifying webhook payloads;
                          returned only at creation time.
                  enabled_notification_preferences:
                    type: array
                    items:
                      type: string
                    description: List of preference keys (e.g. 'host:low_disk_space')
                      that were automatically enabled for webhook delivery.
              example:
                success: true
                webhook:
                  id: 42
                  user_id: 1001
                  name: My Webhook
                  webhook_url: https://example.com/vastai-events
                  event_types:
                  - low_disk_space
                  created_at: 1700000000
                  updated_at: 1700000000
                  webhook_secret: abc123secretkey
                enabled_notification_preferences:
                - host:low_disk_space
        '400':
          description: 'Bad request; possible messages: ''webhook_url is required
            and must be a string'', ''webhook_url must use HTTPS'', ''webhook_url
            exceeds maximum length of 2048 characters'', ''webhook_url must include
            a hostname'', ''webhook_url has an invalid port'', ''event_types must
            be a list'', ''event_types must contain at least one event type'', ''Unknown
            event type: <slug>'', ''Duplicate event type: <slug>'', "Maximum of 4
            webhooks per user", ''This webhook URL is already registered'''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/workergroups/:
    get:
      summary: List Workergroups
      tags:
      - Serverless
      description: Returns all active workergroups belonging to the authenticated
        user; alias for GET /api/v0/autojobs/.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      responses:
        '200':
          description: 'Returns {success: true, results: [{id, min_load, target_util,
            cold_mult, cold_workers, template_hash, template_id, search_query, launch_args,
            gpu_ram, endpoint_name, endpoint_id, api_key, created_at, user_id}, ...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  results:
                    type: array
                    description: 'List of workergroup objects with fields: id, min_load,
                      target_util, cold_mult, cold_workers, template_hash, template_id,
                      search_query, launch_args, gpu_ram, endpoint_name, endpoint_id,
                      api_key, created_at, user_id.'
                    items:
                      type: object
    post:
      summary: Create Workergroup
      tags:
      - Serverless
      description: Creates a new serverless workergroup for the authenticated user;
        alias for POST /api/v0/autojobs/.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint_name:
                  type: string
                  description: Name of the endpoint group
                  example: vLLM-Qwen3-8B
                endpoint_id:
                  type: integer
                  description: ID of existing endpoint group (alternative to endpoint_name)
                  example: 123
                template_hash:
                  type: string
                  description: Hash ID of template to use for worker instances
                  example: abc123def456
                template_id:
                  type: integer
                  description: ID of template (alternative to template_hash)
                  example: 456
                search_params:
                  type: string
                  description: Search query for finding worker instances (alternative
                    to template)
                  default: verified=true rentable=true rented=false
                  example: gpu_name=RTX_3090 rentable=true
                launch_args:
                  type: string
                  description: Additional launch arguments for worker instances
                  example: --env VAR=value
                min_load:
                  type: number
                  description: Minimum load threshold for scaling
                  default: 1.0
                  example: 1.0
                target_util:
                  type: number
                  description: Target GPU utilization
                  default: 0.9
                  example: 0.9
                cold_mult:
                  type: number
                  description: Cold start multiplier
                  default: 3.0
                  example: 3.0
                cold_workers:
                  type: integer
                  description: Number of cold workers to maintain
                  default: 3
                  example: 3
                max_workers:
                  type: integer
                  description: Maximum number of worker instances
                  default: 20
                  example: 20
                test_workers:
                  type: integer
                  description: Number of test workers
                  default: 3
                  example: 3
                gpu_ram:
                  type: integer
                  description: Minimum GPU RAM in GB
                  default: 24
                  example: 24
      responses:
        '200':
          description: 'Workergroup created; returns {success: true, id: <workergroup_id>}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  id:
                    type: integer
                    description: ID of the newly created workergroup.
              example:
                success: true
                id: 42
        '400':
          description: 'Invalid arguments: missing/invalid search_params, image, endpoint,
            arg lengths, docker login, or storage'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Host-only accounts cannot create workergroups or use serverless
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/instances/:
    get:
      summary: List Instances (v1)
      tags:
      - Instances
      description: Returns paginated GPU instances for the authenticated user with
        keyset pagination and label count aggregations.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 1
      parameters:
      - name: limit
        in: query
        required: false
        description: "Instances per page. Default 25, max 25. Values \u2264 0 are\
          \ treated as 5."
        schema:
          type: integer
          default: 25
          maximum: 25
        example: 25
      - name: after_token
        in: query
        required: false
        description: Keyset pagination cursor from the previous response's `next_token`.
          An invalid token returns a 400 error.
        schema:
          type: string
        example: eyJ2YWx1ZXMiOiB7ImlkIjogMTIzfX0=
      - name: order_by
        in: query
        required: false
        description: 'JSON array of sort directives, e.g. `[{"col":"id","dir":"asc"}]`.
          Valid `dir` values: `asc`, `desc` (anything else treated as `asc`). `id`
          is always appended as a tiebreaker. Invalid column returns 400.'
        schema:
          type: string
        example: '[{"col":"id","dir":"asc"}]'
      - name: select_cols
        in: query
        required: false
        description: JSON array of column names to return, e.g. `["id","label","actual_status"]`.
          Use `["*"]` for all columns (default). Unknown column names are returned
          as `null`.
        schema:
          type: string
          default: '["*"]'
        example: '["id","label","actual_status","dph_total"]'
      - name: select_filters
        in: query
        required: false
        description: 'JSON object of column filters. Supported operators: `eq`, `neq`,
          `gt`, `gte`, `lt`, `lte`, `in`, `notin`.

          Filterable columns: `actual_status`, `gpu_name`, `verification`, `id`, `label`,
          and other columns stored directly on the contract record. Computed fields
          (e.g. `dph_total`, `num_gpus`) are not filterable and return 400.

          '
        schema:
          type: string
          default: '{}'
        example: '{"actual_status":{"eq":"running"}}'
      responses:
        '200':
          description: 'Returns {success: true, total_instances, label_counts, instances_found,
            instances, next_token} with paginated instance data.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True on success
                  total_instances:
                    type: integer
                    description: Total number of matching instances
                  label_counts:
                    type: object
                    description: Map of label string to instance count
                  instances_found:
                    type: integer
                    description: Number of instances in this page
                  instances:
                    type: array
                    items:
                      type: object
                    description: Array of instance objects
                  next_token:
                    type: string
                    description: Pagination token for the next page, or null
        '401':
          description: Unauthenticated or blacklisted user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/instances/lite/:
    get:
      summary: List Instances Lite (v1)
      tags:
      - Instances
      description: Lightweight paginated instance listing intended for the instances
        UI; currently disabled.
      security:
