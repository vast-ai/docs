                  username:
                    type: string
                    description: Username
                  email:
                    type: string
                    description: Email address
                  ssh_key:
                    type: string
                    description: Default SSH public key
                  balance:
                    type: number
                    description: Account credit balance (USD)
                  email_verified:
                    type: boolean
                    description: Whether the email has been verified
                  paypal_email:
