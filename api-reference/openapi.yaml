  /api/v0/ssh/:
    get:
      summary: List SSH Keys
      tags:
      - Accounts
      description: Returns all active SSH public keys associated with the authenticated
        user's account.
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit: 1
      responses:
        '200':
          description: 'Successful response: list of SSH key objects'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: SSH key record with id, user_id, public_key, and related
                    fields
    post:
      summary: Create SSH Key
      tags:
      - Accounts
      description: Adds a new SSH public key to the authenticated user's account.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ssh_key:
                  type: string
                  description: The public SSH key to add (from .pub file)
                  example: ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC...
      responses:
        '200':
          description: 'Success: {"success": true, "key": {ssh key object}}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  key:
                    type: object
                    description: The newly created SSH key record
        '400':
          description: 'Retrieval failure: {"success": false, "error": "SSH key could
            not be retrieved."}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/subaccounts/:
