  /api/v1/templates/validate-auth:
    post:
      summary: Validate Registry Auth
      tags:
      - Templates
      description: Validate Docker registry credentials and return a list of repositories
        accessible with those credentials.
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit: 2.0
      responses:
        '200':
          description: 'Success: returns {"success": true, "authenticated": true,
            "repositories": [...]} with the list of accessible repository names.'
