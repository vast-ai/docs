          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Only team accounts can update member roles; cannot update team
            owner's role; caller lacks sufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Role not found; user is not a member of the team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
