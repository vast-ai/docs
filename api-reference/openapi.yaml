      responses:
        '200':
          description: 'Success: {"success": true, "msg": "Team Successfully Transferred!"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: Human-readable confirmation message
              example:
                success: true
                msg: Team Successfully Transferred!
        '400':
          description: New team owner id required; new and old owner must differ;
            new owner must be a member with manager permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: '"Only the Team''s Owner may transfer ownership of the team"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"Team owner not found" or the specified new owner does not
            exist'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: '"Failed to transfer team ownership" with error detail'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/regen-backup-codes/:
    put:
      summary: Regenerate 2FA Backup Codes
      tags:
      - Accounts
      description: Regenerates 10 new 2FA backup codes after verifying a 2FA code
        or backup code, returning the new codes once.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tfa_method_id:
                  type: integer
                  description: ID of the specific 2FA method to authenticate with;
                    preferred when multiple methods of the same type exist
                  example: 3
                code:
                  type: string
                  description: Verification code from the chosen 2FA method
                  example: '123456'
                secret:
                  type: string
                  description: tfa_secret from the prior send step (required for SMS
                    and email methods)
                  example: abc123secret
                tfa_method:
                  type: string
                  description: The 2FA method used to authorize regeneration
                  example: totp
                  enum:
                  - sms
                  - totp
                  - email
                backup_code:
                  type: string
                  description: Existing backup code that can be used instead of a
                    normal 2FA code to authorize regeneration
                  example: ABCD-EFGH-1234
      responses:
        '200':
          description: 'Returns {msg: "success", backup_codes: [...]} with the 10
            new plaintext backup codes.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    description: '"success"'
                  backup_codes:
                    type: array
                    description: List of 10 new plaintext backup codes in XXXX-XXXX-XXXX
                      format
                    items:
                      type: string
              example:
                msg: success
                backup_codes:
                - ABCD-EFGH-IJKL
                - MNPQ-RSTU-VWXY
        '400':
          description: Missing code or backup_code ("missing_auth_value"), invalid
            tfa_method ("invalid_tfa_method"), or invalid 2FA code ("2fa_verification_failed").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated or invalid backup code ("invalid_backup_code").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Team user in team context ("team_user_forbidden").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed 2FA attempts, method locked ("tfa_locked")
            or Twilio rate limited ("twilio_rate_limited").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/update/:
    put:
      summary: Update 2FA Method
      tags:
      - Accounts
      description: Updates a 2FA method's label or primary status for the authenticated
        user.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tfa_method_id:
                  type: integer
                  description: ID of the 2FA method to update; preferred over tfa_method
                    when multiple methods of the same type exist
                  example: 3
                tfa_method:
                  type: string
                  description: Method type to update; used when tfa_method_id is not
                    provided
                  example: sms
                  enum:
                  - sms
                  - totp
                label:
                  type: string
                  description: User-friendly name for this method (max 30 characters),
                    e.g. 'Work Phone'
                  example: Work Phone
                is_primary:
                  type: boolean
                  description: Set to true to make this the preferred default method;
                    set to false to unset it
                  example: true
      responses:
        '200':
          description: 'Returns {success: true, msg: "2FA method updated", method:
            {...}} with updated method info (phone masked, TOTP secret redacted).'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: '"2FA method updated"'
                  method:
                    type: object
                    description: Updated 2FA method record with phone number masked
                      and TOTP secret redacted
              example:
                success: true
                msg: 2FA method updated
                method:
                  id: 3
                  method: sms
                  label: Work Phone
                  is_primary: true
                  phone_number: '******5678'
                  totp_secret: null
        '400':
          description: No update parameters provided ("invalid_params"), email 2FA
            cannot be updated, label too long (max 30 chars), is_primary must be boolean,
            no changes made, or at least one method must remain primary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: User is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Team user attempting 2FA action in team context ("team_user_forbidden").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        msg:
          type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key must be provided in the Authorization header
