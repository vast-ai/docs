      - Billing
      description: Returns the refundable prepay deposit balance and discount information
        for the specified instance.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 3
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The ID of the instance.
      responses:
        '200':
          description: 'Returns {success: true, refundable_deposit, total_discount,
            discount_months}.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True on success
                  refundable_deposit:
                    type: number
                    description: Amount in USD that would be refunded if the instance
                      is deleted now
                  total_discount:
                    type: number
