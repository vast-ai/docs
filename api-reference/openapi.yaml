            created templates'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  templates:
                    type: array
                    items:
                      type: object
                    description: Updated list of templates created by and associated
                      with the user
        '400':
          description: 'Missing templates list: {success: false, error: "invalid_args",
            msg: "templates cannot be null"}; or docker credentials missing access
            token: "templates with docker username must have an access token"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/volumes/:
    delete:
      summary: Delete Volume
      tags:
      - Volumes
      description: Deletes the specified volume by ID, provided it is not currently
        attached to any running instances.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ID of the volume to delete
                  example: 100
      responses:
        '200':
          description: 'Volume successfully deleted: {"success": true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true when the volume was deleted.
                required:
                - success
              example:
                success: true
        '400':
          description: 'Missing or invalid id parameter; error: "invalid id", msg:
            "id must refer to a valid volume id"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 'Caller does not own the volume; error: "Unauthorized", msg:
            "You are not authorized to delete this volume"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'No volume found matching the given ID; error: "invalid id",
            msg: "could not find a listed volume matching id"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: 'Volume is still attached to active instances; error: "volume
            in use", msg: "existing instances use that volume!"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: 'Internal error locating network disk mount; error: "internal
            error", msg: "Internal error. Please contact Vast support."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List Volumes
      tags:
      - Volumes
      description: Returns the authenticated user's volumes, optionally filtered by
        type (local_volume, network_volume, or all_volume) and instance IDs.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 2
      responses:
        '200':
          description: 'Successful response with a list of volumes: {"volumes": [...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  volumes:
                    type: array
                    items:
                      type: object
                    description: Array of volume objects belonging to the user.
                required:
                - volumes
              example:
                volumes: []
        '400':
          description: 'Invalid type parameter; message: "type must be unspecified
            or one of: [''local_volume'', ''network_volume'', ''all_volume'']"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create Volume Listings
      tags:
      - Volumes
      description: Creates or updates disk volume ask listings for one or more of
        the host's machines.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 5
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hidden_listing:
                  type: boolean
                  description: When true, the volume listing is not shown in public
                    marketplace search results.
                  example: false
                machine:
                  type: integer
                  description: Single machine ID to list a volume for. Use machines
                    (array) for multiple. One of machine or machines is required.
                  example: 7890
                machines:
                  type: array
                  description: List of machine IDs to list volumes for simultaneously.
                    Overrides machine if both are supplied.
                  example:
                  - 7890
                  - 7891
      responses:
        '200':
          description: 'Returns {"success": <bool>, "you_sent": <request_body>, "results":
            [{"machine_id", "user_id", "extended", "new_contracts", "upd_contracts"},
            ...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True if all machine listings succeeded.
                  you_sent:
                    type: object
                    description: The request body that was submitted.
                  results:
                    type: array
                    description: Per-machine result objects.
                    items:
                      type: object
                      properties:
                        machine_id:
                          type: integer
                          description: Machine identifier.
                        user_id:
                          type: integer
                          description: Owner user identifier.
                        extended:
                          type: integer
                          description: Number of active contracts extended.
                        new_contracts:
                          type: array
                          description: Newly created ask contracts.
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: New contract identifier.
                              size:
                                type: number
                                description: Disk size allocated.
                        upd_contracts:
                          type: array
                          description: IDs of updated ask contracts.
                          items:
                            type: integer
        '400':
          description: 'Invalid machine id or no matching machine for account; message:
            "Invalid machine id" or "No such machine(s) for your account"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: 'Machine is offline; returns {"success": false, "msg": "error:
            can only create asks for an online machine."}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Disk ask creation or update failed with invalid arguments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Accept Volume Ask
      tags:
      - Volumes
      description: Accepts a disk volume ask by ID and size, initiating creation of
        the volume for the authenticated user.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ID for the volume
                  example: 420
                size:
                  type: integer
                  description: Size in GB (Defaults to 15)
                  example: 15
      responses:
        '200':
          description: Successful response from volume creation (shape determined
            by create_volume helper)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true on success.
                  volume_name:
                    type: string
                    description: Identifier of the newly created volume (e.g. "V.12345").
                required:
                - success
                - volume_name
              example:
                success: true
                volume_name: V.12345
        '400':
          description: 'Missing or invalid required args (id or size); error: "invalid_args"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/webhooks/{id}/:
    delete:
      summary: Delete User Webhook
      tags:
      - Accounts
      description: Delete a webhook URL for the authenticated user.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of the webhook to delete.
      responses:
        '200':
          description: 'Success; returns {success: true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
              example:
                success: true
        '404':
          description: 'Webhook not found; returns {success: false, msg: ''Webhook
            not found''}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update User Webhook
      tags:
      - Accounts
      description: Update an existing webhook for the authenticated user, changing
        its URL, event subscriptions, or display name.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of the webhook to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url:
                  type: string
                  description: New HTTPS destination URL for event delivery; must
                    satisfy the same validation rules as creation. Optional if event_types
                    or name is provided.
                  example: https://example.com/new-hook
                event_types:
                  type: array
                  description: Replacement list of event slug subscriptions; must
                    be non-empty if provided.
                  example:
                  - low_disk_space
                name:
                  type: string
                  description: New optional display label for the webhook (max 120
                    characters).
                  example: Updated name
      responses:
        '200':
          description: 'Success; returns {success: true, webhook: object, enabled_notification_preferences:
            list}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  webhook:
                    type: object
                    description: Updated webhook object with id, user_id, name, webhook_url,
                      event_types, created_at, and updated_at.
                    properties:
                      id:
                        type: integer
                        description: Webhook ID.
                      user_id:
                        type: integer
                        description: Owning user ID.
                      name:
                        type: string
                        description: Optional display name.
                      webhook_url:
                        type: string
                        description: The HTTPS endpoint URL.
                      event_types:
                        type: array
                        items:
                          type: string
                        description: Subscribed event type slugs.
                      created_at:
                        type: number
                        description: Unix timestamp of creation.
                      updated_at:
                        type: number
                        description: Unix timestamp of last update.
                  enabled_notification_preferences:
                    type: array
                    items:
                      type: string
                    description: Preference keys auto-enabled for webhook delivery
                      as a result of this update.
        '400':
          description: 'Bad request; possible messages: ''At least one of webhook_url,
            event_types, or name is required'', URL/event_types validation errors,
            ''This webhook URL is already registered'''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Webhook not found; returns {success: false, msg: ''Webhook
            not found''}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/workergroups/{id}/:
    delete:
      summary: Delete Workergroup
      tags:
      - Serverless
      description: Soft-deletes a workergroup by ID, terminating associated worker
        instances; alias for DELETE /api/v0/autojobs/{id}/.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the workergroup to delete
      responses:
        '200':
          description: 'Returns {success: true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  deleted_workers:
                    type: array
                    description: List of worker instances that were deleted
                    items:
                      type: integer
                    example:
                    - 1001
                    - 1002
                  failed_workers:
                    type: array
                    description: List of worker instances that failed to delete
                    items:
                      type: integer
                    example: []
                  msg:
                    type: string
                    description: Additional information about the deletion
                    example: Deleted workergroup and 2 workers
              example:
                success: true
        '400':
          description: 'Invalid arguments: "id must be an integer" or "Invalid autojob
            ID"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"No autojob by that id is available."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update Workergroup
      tags:
      - Serverless
      description: Updates scaling parameters, template, search params, or launch
        args on an existing workergroup; alias for PUT /api/v0/autojobs/{id}/.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The ID of the workergroup to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                min_load:
                  type: number
                  description: Minimum load for the workergroup.
                  example: 1.0
                target_util:
                  type: number
                  description: Target utilization for the workergroup.
                  example: 0.9
                cold_mult:
                  type: number
                  description: Cold multiplier for the workergroup.
                  example: 3.0
                test_workers:
                  type: integer
                  description: Number of test workers for performance estimation.
                  default: 3
                  example: 3
                template_hash:
                  type: string
                  description: Template hash for the workergroup.
                  example: abc123def456
                template_id:
                  type: integer
                  description: Template ID for the workergroup.
                  example: 456
                search_params:
                  type: string
                  description: Search parameters for offers (JSON object or query
                    string).
                  default: verified=true rentable=true rented=false
                  example: gpu_name=RTX_3090 rentable=true
                launch_args:
                  type: string
                  description: Launch arguments for creating instances.
                  example: --env VAR=value
                gpu_ram:
                  type: number
                  description: Estimated GPU RAM requirement.
                  example: 24
                endpoint_name:
                  type: string
                  description: Deployment endpoint name.
                  example: vLLM-Qwen3-8B
                endpoint_id:
                  type: integer
                  description: Deployment endpoint ID.
                  example: 123
      responses:
        '200':
          description: 'Returns {success: true}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
              example:
                success: true
        '400':
          description: 'Invalid arguments: missing endpoint_id, deployment-owned workergroup,
            endpoint not found, workergroup not found, or invalid search_params'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Host-only accounts cannot update workergroups or use serverless
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/audit_logs/:
    get:
      summary: List Audit Logs
      tags:
      - Accounts
      description: Returns the authenticated user's audit log entries, optionally
        filtered and paginated via standard query parameters.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      responses:
        '200':
          description: 'Successful response: list of audit log entries'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/v0/auth/apikeys/:
    get:
      summary: List User API Keys
      tags:
      - Accounts
      description: Returns all active API keys for the authenticated user.
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit: 1
      responses:
        '200':
          description: 'Returns {apikeys: [...]} with key values redacted (set to
            null).'
          content:
            application/json:
              schema:
                type: object
                properties:
                  apikeys:
                    type: array
                    description: List of API key records; actual key values are set
                      to null
                    items:
                      type: object
              example:
                apikeys:
                - id: 1
                  user_id: 123
                  key: null
                  key_type: api
                  name: My Key
                  team_id: null
                  team_name: null
                  team_owner: null
        '400':
          description: API Key not provided as bearer token ("API Key not provided
            as bearer token.") or API Key not found ("API Key not found.").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: User is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create API Key
      tags:
      - Accounts
      description: Creates a new API key for the authenticated user with optional
        custom permissions and name, returning the unhashed key once.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name for the API key
                  example: read-only-key
                permissions:
                  type: object
                  description: JSON object containing permission definitions
                  example:
                    read: true
                    write: false
                key_params:
                  type: object
                  description: Optional wildcard parameters for advanced keys
                  example:
                    ip_whitelist:
                    - 1.2.3.4
              required:
              - name
      responses:
        '200':
          description: 'Returns {success: true, id, key, permissions} with the plaintext
            key (shown once only).'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the key was created
                  id:
                    type: integer
                    description: ID of the new API key
                  key:
                    type: string
                    description: "Unhashed API key value \u2014 shown only once"
                  permissions:
                    type: object
                    description: Permissions assigned to the new key
              example:
                success: true
                id: 99
                key: abc123...
                permissions:
                  api: {}
        '400':
          description: 'Returns {success: false, msg: "Failed to create API key."}
            on unexpected error error.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: User is not authenticated, or not authorized to create a key
            for another user, or not authorized to create a key with the specified
            permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/autojobs/:
    get:
      summary: List Autojob Workergroups
      tags:
      - Serverless
      description: Returns all active workergroups (autojobs) belonging to the authenticated
        user, with endpoint and API key details.
      security:
      - BearerAuth: []
      x-rateLimit: 2
      responses:
        '200':
          description: 'Returns {success: true, results: [{id, min_load, target_util,
            cold_mult, cold_workers, template_hash, template_id, search_query, launch_args,
            gpu_ram, endpoint_name, endpoint_id, api_key, created_at, user_id}, ...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  results:
                    type: array
                    description: List of workergroup objects.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Workergroup ID.
                        min_load:
                          type: number
                          description: Minimum load threshold.
                        target_util:
                          type: number
                          description: Target utilization ratio.
                        cold_mult:
                          type: number
                          description: Cold worker multiplier.
                        cold_workers:
                          type: integer
                          description: Number of cold (standby) workers.
                        template_hash:
                          type: string
                          description: Hash ID of the associated template.
                        template_id:
                          type: integer
                          description: ID of the associated template.
                        search_query:
                          type: object
                          description: Machine search query parameters.
                        launch_args:
                          type: string
                          description: CLI launch arguments for workers.
                        gpu_ram:
                          type: number
                          description: Required GPU RAM in GB.
                        endpoint_name:
                          type: string
                          description: Name of the associated endpoint.
                        endpoint_id:
                          type: integer
                          description: ID of the associated endpoint.
                        api_key:
                          type: string
                          description: Auth token for the user.
                        created_at:
                          type: number
                          description: Unix timestamp when the workergroup was created.
                        user_id:
                          type: integer
                          description: ID of the owning user.
              example:
                success: true
                results:
                - id: 7
                  min_load: 0
                  target_util: 0.9
                  cold_mult: 3
                  cold_workers: 5
                  template_hash: abc123
                  template_id: 101
                  search_query:
                    verified:
                      eq: true
                  launch_args: --image pytorch/pytorch
                  gpu_ram: 8
                  endpoint_name: my-endpoint
                  endpoint_id: 3
                  api_key: tok_abc
                  created_at: 1700000000
                  user_id: 55
    post:
      summary: Create Autojob Workergroup
      tags:
      - Serverless
      description: Creates a new serverless workergroup (autojob) for the authenticated
        user, optionally creating an endpoint if one doesn't exist.
      security:
      - BearerAuth: []
      x-rateLimit: 4
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                min_load:
                  type: number
                  description: Minimum load threshold below which the autoscaler keeps
                    warm workers running.
                  example: 0.1
                min_cold_load:
                  type: number
                  description: Minimum baseline of cold (standby) load capacity the
                    endpoint should maintain; applied when the endpoint is auto-created
                    via endpoint_name.
                  example: 0.0
                target_util:
                  type: number
                  description: Target utilization ratio (0-1) that the autoscaler
                    aims to maintain across workers.
                  example: 0.8
                cold_mult:
                  type: number
                  description: Multiplier controlling how many cold-standby workers
                    are maintained relative to active workers.
                  example: 2
                cold_workers:
                  type: integer
                  description: Fixed number of cold (standby) workers to keep available;
                    must be <= max_workers.
                  example: 3
                max_workers:
                  type: integer
                  description: Upper bound on the total number of workers this workergroup
                    may scale up to.
                  example: 10
                test_workers:
                  type: integer
                  description: Number of workers reserved for testing/canary use.
                  example: 1
                gpu_ram:
                  type: number
                  description: Minimum GPU RAM in GB to target when selecting machines
                    for this workergroup.
                  example: 16
                autoscaler_instance:
                  type: string
                  description: Autoscaler deployment environment to use (e.g. 'prod',
                    'dev').
                  example: prod
                docker_login_user:
                  type: string
                  description: Docker registry username for pulling private images.
                  example: myuser
                docker_login_pass:
                  type: string
                  description: Docker registry password for pulling private images.
                docker_login_repo:
                  type: string
                  description: Docker registry hostname/repo to authenticate against.
                  example: docker.io
                template_hash:
                  type: string
                  description: Hash ID of a saved template to use for worker launch
                    configuration.
                  example: abc123def456
                template_id:
                  type: integer
                  description: Numeric ID of a saved template to use for worker launch
                    configuration.
                  example: 999
                launch_args:
                  type: string
                  description: Additional CLI-style arguments to pass when launching
                    worker instances.
                  example: --image pytorch/pytorch:latest --disk 20
                endpoint_name:
                  type: string
                  description: Human-readable name identifying the target endpoint;
                    if no endpoint with this name exists, one is automatically created.
                  example: my-inference-endpoint
                endpoint_id:
                  type: integer
                  description: Numeric ID of an existing endpoint to attach this workergroup
                    to; required when endpoint_name is not provided.
                  example: 42
                search_params:
                  type: string
                  description: GPU offer filter expression (e.g. 'gpu_ram>=16 num_gpus=1')
                    that the autoscaler uses to find machines for workers.
                  example: gpu_ram>=16 num_gpus=1
      responses:
        '200':
          description: 'Workergroup created; returns {success: true, id: <workergroup_id>}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  id:
                    type: integer
                    description: ID of the newly created workergroup.
              example:
                success: true
                id: 42
        '400':
          description: 'Invalid arguments: missing/invalid search_params, image, endpoint,
            arg lengths, docker login, or storage'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Host-only accounts cannot create workergroups or use serverless
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/bundles/:
    get:
      summary: Search Offers (GET)
      tags:
      - Search
      description: "Search for available GPU machine offers using a JSON-encoded `q`\
        \ query parameter \u2014 the same query object the POST body accepts; see\
        \ POST /api/v0/bundles/ for the full list of filterable fields and operators."
      security:
      - BearerAuth: []
      x-rateLimit:
        profile: low_volume_burst
        threshold: 2
      parameters:
      - name: q
        in: query
        required: false
        description: "JSON-encoded search query object \u2014 the same format as the\
          \ POST body: offer fields with filter expressions {operator: value} (operators:\
          \ eq, neq, gt, gte, lt, lte, in, notin) plus special keys limit, order,\
          \ type."
        schema:
          type: string
        example: '{"gpu_name": {"eq": "RTX 4090"}, "num_gpus": {"gte": 2}, "limit":
          64}'
      - name: select_cols
        in: query
        required: false
        description: Optional JSON-encoded array of offer columns to include in the
          results.
        schema:
          type: string
        example: '["id", "gpu_name", "dph_total"]'
      responses:
        '200':
          description: 'Successful response with matching offers: {"offers": [...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  offers:
                    type: array
                    description: Array of offer objects with pricing, GPU specs, and
                      scoring fields
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Offer/contract ID
                        gpu_name:
                          type: string
                          description: GPU model name
                        num_gpus:
                          type: integer
                          description: Number of GPUs in the offer
                        dph_total:
                          type: number
                          description: Total price per hour (USD)
                        dph_base:
                          type: number
                          description: Base GPU price per hour (USD)
                        min_bid:
                          type: number
                          description: Minimum interruptible bid price
                        score:
                          type: number
                          description: Computed quality/value score
                        reliability:
                          type: number
                          description: "Host reliability score (0\u20131)"
                        dlperf:
                          type: number
                          description: Deep-learning performance score
                        dlperf_per_dphtotal:
                          type: number
                          description: Performance per dollar
                        gpu_ram:
                          type: number
                          description: GPU RAM per card (MB)
                        disk_space:
                          type: number
                          description: Available disk space (GB)
                        verification:
                          type: string
                          description: Host verification status string
                        rented:
                          type: boolean
                          description: Whether the caller is renting this offer
                        duration:
                          type: number
                          description: Available rental duration remaining (seconds)
              example:
                offers:
                - id: 12345
                  gpu_name: RTX 4090
                  num_gpus: 1
                  dph_total: 0.45
                  dph_base: 0.4
                  score: 1.23
                  reliability: 0.99
                  dlperf: 22.5
                  verification: verified
                  rented: false
        '400':
          description: 'Invalid query: "Invalid query: must be dict of conditions"
            or "Invalid json body"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Search Offers
      tags:
      - Search
      description: 'Search for available GPU machine offers with advanced filtering
        and sorting.


        Each filter parameter (such as `verified`, `gpu_name`, `num_gpus`, etc.) should
        be an object specifying the operator and value you want to match.


        **Filter operators:**


        | Operator | Meaning                | Example                        |

        |:---------|:-----------------------|:-------------------------------|

        | `eq`     | Equal to               | `{ "eq": true }`               |

        | `neq`    | Not equal to           | `{ "neq": false }`             |

        | `gt`     | Greater than           | `{ "gt": 0.99 }`               |

        | `lt`     | Less than              | `{ "lt": 10000 }`              |

        | `gte`    | Greater than or equal  | `{ "gte": 4 }`                 |

        | `lte`    | Less than or equal     | `{ "lte": 8 }`                 |

        | `in`     | Value is in a list     | `{ "in": ["RTX_3090", "RTX_4090"] }`
        |

        | `notin`  | Value is not in a list | `{ "notin": ["TW", "SE"] }`    |


        CLI Usage: `vastai search offers ''reliability > 0.99 num_gpus>=4'' --order=dph_total`'
      security:
      - BearerAuth: []
      x-rateLimit:
        profile: low_volume_burst
        threshold: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  description: Max offers to return
                type:
                  type: string
                  enum:
                  - ondemand
                  - bid
                  - reserved
                  description: 'Instance type for the offer. Affects pricing calculation.


                    - **ondemand**: Fixed pricing based on listed rates. Default.

                    - **bid** (interruptible): Uses minimum bid price. Lower cost
                    but may be interrupted if outbid.

                    - **reserved**: Reserved instance pricing.

                    '
                verified:
                  type: object
                  description: Machine verification status
                  properties:
                    eq:
                      type: boolean
                  default:
                    eq: true
                rentable:
                  type: object
                  description: Whether machine is rentable
                  properties:
                    eq:
                      type: boolean
                  default:
                    eq: true
                rented:
                  type: object
                  description: 'When set to true, include offers where the calling
                    user already has rented GPUs.

                    This is useful for finding offers on machines you''re already
                    renting.

                    '
                  properties:
                    eq:
                      type: boolean
                  default:
                    eq: false
                gpu_name:
                  type: object
                  description: 'GPU model name. Example: {"eq": "RTX_4090"} or {"in":
                    ["RTX_3090", "RTX_4090"]}'
                  properties:
                    in:
                      type: array
                      items:
                        type: string
                      example:
                      - RTX_3090
                      - RTX_4090
                reliability:
                  type: object
                  description: 'Machine reliability score (0-1). Example: {"gte":
                    0.99}'
                num_gpus:
                  type: object
                  description: 'Number of GPUs. Example: {"gte": 4} or {"in": [1,
                    2, 4, 8]}'
                  properties:
                    in:
                      type: array
                      items:
                        type: integer
                      example:
                      - 1
                      - 2
                      - 4
                      - 8
                gpu_ram:
                  type: object
                  description: 'GPU RAM in MB. Example: {"gte": 24000}'
                duration:
                  type: object
                  description: Minimum required rental duration in seconds (the offer
                    must be available for at least this long from now).
                machine_id:
                  type: object
                  description: Filter by specific host machine ID
                dlperf_per_dphtotal:
                  type: object
                  description: DLPerf per dollar per hour
                dph_total:
                  type: object
                  description: 'Total $/hour rental cost. Example: {"lte": 0.5}'
                flops_per_dphtotal:
                  type: object
                  description: TFLOPs per $/hour
                geolocation:
                  type: object
                  description: 'Machine location (two letter country code). Example:
                    {"in": ["US", "CA"]}'
                  properties:
                    in:
                      type: array
                      items:
                        type: string
                      example:
                      - US
                      - CA
                gpu_arch:
                  type: object
                  description: 'Host machine GPU architecture (e.g. nvidia, amd).
                    Example: {"eq": "nvidia"}'
                dlperf:
                  type: object
                  description: Deep Learning performance score
                cuda_max_good:
                  type: object
                  description: Maximum supported CUDA version
                inet_down:
                  type: object
                  description: Download bandwidth (MB/s)
                inet_up:
                  type: object
                  description: Upload bandwidth (MB/s)
                inet_down_cost:
                  type: object
                  description: Download bandwidth cost ($/GB)
                inet_up_cost:
                  type: object
                  description: Upload bandwidth cost ($/GB)
                driver_version:
                  type: object
                  description: NVIDIA driver version in the format "XXX.XX.XX"
                compute_cap:
                  type: object
                  description: CUDA compute capability x 100. Use 650 for compute
                    capability 6.5 or 700 for 7.0.
                cpu_arch:
                  type: object
                  description: 'Host machine CPU architecture (Default is amd64).
                    Example: {"eq": "amd64"}'
                has_avx:
                  type: object
                  description: CPU supports AVX instruction set
                cpu_cores:
                  type: object
                  description: Number of virtual CPUs
                cpu_cores_effective:
                  type: object
                  description: Effective vCPU count for the offer
                cpu_ghz:
                  type: object
                  description: CPU clock speed in GHz
                cpu_ram:
                  type: object
                  description: CPU RAM in MB
                datacenter:
                  type: object
                  description: Show only datacenter offers
                external:
                  type: object
                  description: Show external offers in addition to datacenter offers
                disk_bw:
                  type: object
                  description: Disk read bandwidth in MB/s
                disk_space:
                  type: object
                  description: Disk storage space in GB
                bw_nvlink:
                  type: object
                  description: NVLink interconnect bandwidth in GB/s. Use when filtering
                    for multi-GPU systems with high-speed NVLink.
                gpu_max_power:
                  type: object
                  description: GPU power limit in watts
                gpu_max_temp:
                  type: object
                  description: GPU temperature limit in Celsius
                gpu_mem_bw:
                  type: object
                  description: GPU memory bandwidth in GB/s
                gpu_total_ram:
                  type: object
                  description: Total GPU RAM across all GPUs in MB
                gpu_frac:
                  type: object
                  description: Fraction of the total GPU resources being offered
                gpu_display_active:
                  type: object
                  description: Whether the GPU has an attached display
                direct_port_count:
                  type: object
                  description: Number of direct ports
                host_id:
                  type: object
                  description: Host user ID
                id:
                  type: object
                  description: Offer ID
                min_bid:
                  type: object
                  description: Minimum bid price ($/hour)
                mobo_name:
                  type: object
                  description: Motherboard name
                pci_gen:
                  type: object
                  description: PCIe generation
                pcie_bw:
                  type: object
                  description: PCIe bandwidth (CPU to GPU)
                storage_cost:
                  type: object
                  description: Storage cost in $/GB/month
                static_ip:
                  type: object
                  description: Whether the IP address is static/stable
                total_flops:
                  type: object
                  description: Total theoretical GPU compute performance (TFLOPs)
                    across all GPUs.
                os_version:
                  type: object
                  description: Host machine Ubuntu OS version
                ubuntu_version:
                  type: object
                  description: Host machine Ubuntu OS version (alias for os_version)
                verification:
                  type: object
                  description: 'Machine verification status string (verified, deverified,
                    unverified). Example: {"eq": "verified"}'
                vms_enabled:
                  type: object
                  description: Whether the machine is a VM instance
                order:
                  type: array
                  description: 'List of sort fields and directions.

                    Each entry should contain two elements:

                    1. The field name to sort by (string)

                    2. The sort direction ("asc" or "desc")

                    '
                  items:
                    type: array
                    items:
                      type: string
                  minItems: 2
                  maxItems: 2
                allocated_storage:
                  type: number
                  description: 'Storage allocation size in GB for the instance.

                    This sets the disk size when creating the instance and cannot
                    be changed later.

                    Default is 8GB.

                    '
                disable_bundling:
                  type: boolean
                  description: If true, machines are not bundled into multi-GPU offers.
              additionalProperties:
                type: object
                description: 'Filter expression for an offer field: {operator: value},
                  e.g. {"gte": 2} or {"in": ["RTX 4090", "RTX 5090"]}.'
                properties:
                  eq:
                    description: '"eq" comparison against the field value'
                  neq:
                    description: '"neq" comparison against the field value'
                  gt:
                    description: '"gt" comparison against the field value'
                  gte:
                    description: '"gte" comparison against the field value'
                  lt:
                    description: '"lt" comparison against the field value'
                  lte:
                    description: '"lte" comparison against the field value'
                  in:
                    description: '"in" comparison against the field value'
                  notin:
                    description: '"notin" comparison against the field value'
                additionalProperties: false
            example:
              limit: 100
              type: on-demand
              verified:
                eq: true
              rentable:
                eq: true
              rented:
                eq: false
        description: The raw search query object (not wrapped in a "q" key).
      responses:
        '200':
          description: 'Successful response with matching offers: {"offers": [...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  offers:
                    type: array
                    description: Array of offer objects with pricing, GPU specs, and
                      scoring fields
                    items:
                      type: object
        '400':
          description: 'Invalid query or body: "Invalid query: must be dict of conditions"
            or "Invalid json body"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/charges/:
    get:
      summary: List Instance Charges
      tags:
      - Billing
      description: Returns paginated instance charge details for the authenticated
        user within a required day range, optionally formatted as a hierarchical tree.
      security:
      - BearerAuth: []
      x-scope: billing_read
      x-rateLimit: 1
      parameters:
      - name: select_filters
        in: query
        required: true
        description: '**`day`** (required). Date range in unix seconds (UTC). Operators:
          `gte`, `lte`.


          **`type`** (optional). Filter by contract type: `instance`, `volume`, `serverless`.
          Operator: `in`.


          **Examples**:

          ```json

          // All charges in January 2026

          {"day":{"gte":1767225600,"lte":1769903999}}


          // Only instance charges

          {"day":{"gte":1767225600,"lte":1769903999},"type":{"in":["instance"]}}


          // Volumes and serverless only

          {"day":{"gte":1767225600,"lte":1769903999},"type":{"in":["volume","serverless"]}}

          ```

          '
        schema:
          type: string
      - name: format
        in: query
        required: false
        description: '- `table` (default) flat list of per-contract rows with `type:
          "instance"` or `"volume"`.

          - `tree` serverless contracts are collapsed under endpoint/workergroup wrappers
          with `type: "serverless"` and `source: "endpoint-<id>"` / `"workergroup-<id>"`.
          Regular instances and volumes are unchanged.

          '
        schema:
          type: string
          enum:
          - table
          - tree
          default: table
          example: table
      - name: latest_first
        in: query
        required: false
        description: Sort by most recent charges first.
        schema:
          type: boolean
          default: true
          example: true
      - name: limit
        in: query
        required: false
        description: Max results per page. Server maximum 500.
        schema:
          type: integer
          minimum: 1
          default: 100
          example: 20
      - name: after_token
        in: query
        required: false
        description: 'Pass the `next_token` value from the previous response to fetch
          the next page of results. When the response returns `next_token: null`,
          there are no more pages.'
        schema:
          type: string
          example: eyJ2YWx1ZXMiOiB7ImlkIjogMTIzNDU2Nzh9fQ==
      responses:
        '200':
          description: 'Host users: {"success": false, "msg": "Host users do not have
            instance charges", "count": 0, ...}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True on success
                  count:
                    type: integer
                    description: Number of unique instances/volumes in the result
                  total:
                    type: integer
                    description: Total matching instances/volumes across all pages
                  results:
                    type: array
                    items:
                      type: object
                    description: Charge entries with start, end, type, source, description,
                      amount, metadata, and items fields
                  next_token:
                    type: string
                    description: Cursor for the next page, or null
        '400':
          description: 'Missing day filters: "Must provide both ''day'' gte and lte
            filters for instance charges"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/commands/schedule_job/:
    get:
      summary: List Scheduled Jobs
      tags:
      - Instances
      description: Returns the list of scheduled jobs belonging to the authenticated
        user, up to 2048 results.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 3.5
      responses:
        '200':
          description: Array of scheduled job records for the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      summary: Create Scheduled Job
      tags:
      - Instances
      description: Creates a new scheduled job that periodically calls a specified
        API endpoint on behalf of the authenticated user.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 3.5
      responses:
        '200':
          description: 'Scheduled job created successfully; returns {success: true,
            scheduled_job_id: <id>, msg: <message>}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  scheduled_job_id:
                    type: integer
                    description: ID of the newly created scheduled job
                  msg:
                    type: string
                    description: Human-readable confirmation message
              example:
                success: true
                scheduled_job_id: 42
                msg: Successfully inserted new scheduled job with ID 42 for user_id
                  1234 and instance_id 5678
        '400':
          description: Scheduled job limit exceeded or invalid/missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: 'A matching scheduled job already exists for this user, instance,
            endpoint, and method; returns {error: "job_exists"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: 'Failed to create the scheduled job; returns {error: "insert_failed"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/deployment/{id}/download_url/:
    get:
      summary: Get Deployment Download URL
      tags:
      - Serverless
      description: Generates and returns a presigned S3 URL to download the current
        deployment blob, valid for 1 hour.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the deployment to get the artifact download URL
          for.
      responses:
        '200':
          description: 'Returns {success: true, download_url: <presigned_s3_url>}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  download_url:
                    type: string
                    description: Presigned S3 URL valid for 1 hour.
              example:
                success: true
                download_url: https://s3.amazonaws.com/bucket/1/myapp/abc123?...
        '400':
          description: '"Invalid deployment ID" or "No blob has been uploaded for
            this deployment."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"Deployment {deployment_id} not found."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/deployment/{id}/versions/:
    get:
      summary: List Deployment Versions
      tags:
      - Serverless
      description: Returns all stored file versions for a deployment, ordered by creation
        date descending.
      security:
      - BearerAuth: []
      x-scope: instance_read
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the deployment whose versions to list.
      responses:
        '200':
          description: 'Returns {success: true, versions: [{id, file_hash, version_label,
            file_size, created_at, last_used_at}, ...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  versions:
                    type: array
                    description: List of version objects.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Version ID.
                        file_hash:
                          type: string
                          description: Hash of the deployment blob.
                        version_label:
                          type: string
                          description: Human-readable version label.
                        file_size:
                          type: integer
                          description: Size of the blob in bytes.
                        created_at:
                          type: number
                          description: Unix timestamp of version creation.
                        last_used_at:
                          type: number
                          description: Unix timestamp when this version was last made
                            active.
              example:
                success: true
                versions:
                - id: 3
                  file_hash: abc123
                  version_label: v2
                  file_size: 204800
                  created_at: 1700000000
                  last_used_at: 1700001000
        '400':
          description: '"Invalid deployment ID"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"Deployment {deployment_id} not found."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/endptjobs/:
    get:
      summary: List Endpoints
      tags:
      - Serverless
      description: Returns all active serverless endpoints for the authenticated user,
        including autoscaling config and auto-delete countdown.
      security:
      - BearerAuth: []
      x-rateLimit: 3
      responses:
        '200':
          description: 'Returns {success: true, results: [{id, min_load, min_cold_load,
            target_util, cold_mult, cold_workers, max_workers, max_queue_time, target_queue_time,
            endpoint_name, api_key, user_id, created_at, endpoint_state, inactivity_timeout,
            auto_delete_in_seconds, auto_delete_due_24h}, ...]}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  results:
                    type: array
                    description: List of endpoint objects.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Endpoint ID.
                        min_load:
                          type: number
                          description: Minimum load threshold.
                        min_cold_load:
                          type: number
                          description: Minimum cold load threshold.
                        target_util:
                          type: number
                          description: Target utilization ratio.
                        cold_mult:
                          type: number
                          description: Cold worker multiplier.
                        cold_workers:
                          type: integer
                          description: Number of cold (standby) workers.
                        max_workers:
                          type: integer
                          description: Maximum allowed workers.
                        max_queue_time:
                          type: number
                          description: Maximum queue wait time in seconds.
                        target_queue_time:
                          type: number
                          description: Target queue wait time in seconds.
                        endpoint_name:
                          type: string
                          description: Human-readable endpoint name.
                        api_key:
                          type: string
                          description: Auth token for the user.
                        user_id:
                          type: integer
                          description: ID of the owning user.
                        created_at:
                          type: number
                          description: Unix timestamp of creation.
                        endpoint_state:
                          type: string
                          description: Current state of the endpoint (e.g. active,
                            stopped).
                        inactivity_timeout:
                          type: number
                          description: Seconds of inactivity before auto-stop.
                        auto_delete_in_seconds:
                          type: number
                          description: Seconds until auto-deletion if endpoint has
                            no workergroups; null if has active workergroups.
                        auto_delete_due_24h:
                          type: boolean
                          description: True if auto-deletion is due within 24 hours.
        '400':
          description: '"No endpoints for user {user_id} found."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create Endpoint
      tags:
      - Serverless
      description: Creates a new serverless endpoint (endptjob) for the authenticated
        user with the specified autoscaling configuration.
      security:
      - BearerAuth: []
      x-rateLimit: 4
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                min_load:
                  type: number
                  description: Minimum load for the endpoint.
                  example: 50.0
                min_cold_load:
                  type: number
                  description: Minimum cold load threshold below which cold workers
                    are maintained.
                  example: 0
                target_util:
                  type: number
                  description: Target utilization for the endpoint.
                  example: 0.75
                cold_mult:
                  type: number
                  description: Multiplier for cold start.
                  example: 2.0
                cold_workers:
                  type: integer
                  description: Number of cold workers.
                  example: 5
                max_workers:
                  type: integer
                  description: Maximum number of workers.
                  example: 20
                max_queue_time:
                  type: number
                  description: Maximum acceptable queue time in seconds before scaling
                    up.
                  example: 60
                target_queue_time:
                  type: number
                  description: Desired queue time in seconds that the autoscaler targets;
                    must be <= max_queue_time.
                  example: 10
                autoscaler_instance:
                  type: string
                  description: Autoscaler deployment environment to attach this endpoint
                    to.
                  example: prod
                endpoint_state:
                  type: string
                  description: Initial activation state of the endpoint.
                  example: active
                  enum:
                  - active
                  - suspended
                  - stopped
                endpoint_name:
                  type: string
                  description: Name of the endpoint.
                  example: my_endpoint
                inactivity_timeout:
                  type: number
                  description: Seconds of inactivity after which the autoscaler may
                    suspend the endpoint.
                  example: 300
                overrecruit_ratio:
                  type: number
                  description: Ratio by which to over-recruit workers to absorb traffic
                    spikes.
                  example: 1.2
      responses:
        '200':
          description: 'Returns {success: true, result: <new_endpoint_id>}'
          content:
            application/json:
              schema:
                type: object
                properties:
