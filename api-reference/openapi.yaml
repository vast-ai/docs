      x-scope: machine_write
      x-rateLimit: 5
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ID of the volume listing to unlist
                  example: 2029
      responses:
        '200':
          description: 'Success; returns {"success": true, "msg": "Unlisted Volume
            <id>."}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  msg:
                    type: string
                    description: Confirmation message including the volume ID.
                required:
                - success
