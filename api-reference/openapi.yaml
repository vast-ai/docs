            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true on successful authentication
                  authenticated:
                    type: boolean
                    description: true when credentials were accepted by the registry
                  repositories:
                    type: array
                    items:
                      type: string
                    description: List of accessible repository names in "namespace/name"
                      format
                required:
                - success
                - authenticated
                - repositories
              example:
                success: true
                authenticated: true
