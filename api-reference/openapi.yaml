        '200':
          description: 'Returns {success: true, msg: "Template {id} Deleted Successfully"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: E.g. "Template 123 Deleted Successfully"
        '400':
          description: 'Missing or non-integer template_id: "Invalid Template ID or
            User ID" or "Template ID must be integer"; or others still use it: "Cannot
            Delete Template. Other Users are still using it."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 'User is not the template creator: {success: false, msg: "Templates
