                    items:
                      type: object
                    description: Array of matching template objects
                  next_token:
                    type: string
                    description: Opaque pagination cursor for fetching the next page;
                      null when no more results
        '400':
          description: 'Malformed JSON or unexpected error; returns {success: false,
            error, msg}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update Template (v1)
      tags:
      - Templates
      description: Updates a template by ID and hash_id; creates a new version if
        the user is not the creator or if other users or active instances reference
        the original.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.9
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hash_id:
                  type: string
                  description: Current MD5 hash of the template to update, used to
                    verify the correct version is being modified (required)
                  example: 49c538d097ad6437413b83711c9f61e8
                template:
                  type: object
                  description: Template object whose hash_id is used as a fallback
                    to identify the template to update when no top-level hash_id is
                    provided.
      responses:
        '200':
          description: 'Returns {success: true, hash_id, msg, template}; msg varies:
            "No Edits made...", "Created an Edited Copy...", or "Created an Edited
            Copy of Template..."'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  hash_id:
                    type: string
                    description: Hash ID (present when no edits were made)
                  msg:
                    type: string
                    description: 'Outcome description, e.g. ''Created an Edited Copy
                      of Template 123. New Template ID: 456'' or ''No Edits made for
                      template 123'''
                  template:
                    type: object
                    description: The updated or newly created template object
        '400':
          description: 'Missing hash_id or template id, invalid params, unexpected
            column key, or other validation error; returns {success: false, error,
            msg}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Template not found or deleted, or hash_id mismatch: {success:
            false, error: "invalid_template", msg: "error 404: Template not found"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/user/earnings/:
    get:
      summary: List Earnings (v1)
      tags:
      - Accounts
      description: Returns a paginated, sortable list of earnings rows grouped by
        day or machine, plus a windowed total, for the authenticated user.
      security:
      - BearerAuth: []
      x-scope: billing_read
      x-rateLimit: 1.9
      responses:
        '200':
          description: 'Success: {"success": true, "total_rows": int, "rows_found":
            int, "rows": [...], "next_token": str|null, "total": {...}}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  total_rows:
                    type: integer
                    description: Total number of rows in the dataset for the given
                      window
                  rows_found:
                    type: integer
                    description: Number of rows returned in this page
                  rows:
                    type: array
                    items:
                      type: object
                    description: Day or machine rows with gpu_earn, sto_earn, bwu_earn,
                      bwd_earn, sla_earn, referral_earn, referral_count, and total_earn
                      fields
                  next_token:
                    type: string
                    description: Cursor for the next page, or null
                  total:
                    type: object
                    description: Windowed aggregate totals across all rows
        '400':
          description: 'Bad request: invalid group_by, limit out of range, unsupported
            select_filters key, invalid order_by col/dir, or invalid after_token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/user/earnings/summary/:
    get:
      summary: Get Earnings Summary
      tags:
      - Accounts
      description: Returns an all-time, date-range-independent aggregate of the authenticated
        user's earnings.
      security:
      - BearerAuth: []
      x-scope: billing_read
      x-rateLimit: 1.9
      responses:
        '200':
          description: 'Success: {"success": true, "summary": {"gpu_earn": float,
            "sto_earn": float, "bwu_earn": float, "bwd_earn": float, "sla_earn": float,
            "referral_earn": float, "referral_count": int, "total_earn": float, "reliability":
            float|null}}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  summary:
                    type: object
                    description: Aggregate earnings object with gpu_earn, sto_earn,
                      bwu_earn, bwd_earn, sla_earn, referral_earn, referral_count,
                      total_earn, and reliability fields
  /api/v0/asks/bulk/:
    post:
      summary: Create Instances Bulk
      tags:
      - Instances
      description: Creates multiple instance contracts at once by accepting a list
        of offer (ask) IDs with shared configuration parameters.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 4.5
      responses:
        '200':
          description: 'Returns {success: true, results: [...], created: [contract_ids],
            failed: [ask_ids], elapsed} when at least one instance was created; each
            result item contains {ask_id, success, new_contract, state} or {ask_id,
            success, error, msg} for failures.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True if at least one contract was created
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        ask_id:
                          type: integer
                          description: The offer ID that was processed
                        success:
                          type: boolean
                          description: True if this offer was accepted
                        new_contract:
                          type: integer
                          description: New instance contract ID (on success)
                        state:
                          type: string
                          description: Container state after creation (on success)
                        error:
                          type: string
                          description: Error code (on failure)
                        msg:
                          type: string
                          description: Error message (on failure)
                    description: Per-offer results
                  created:
                    type: array
                    items:
                      type: integer
                    description: List of successfully created contract IDs
                  failed:
                    type: array
                    items:
                      type: integer
                    description: List of offer IDs that failed
                  elapsed:
                    type: number
                    description: Total elapsed time in seconds
        '400':
          description: 'Returns {success: false, error: "invalid_args", msg: "error
            missings offer ''ids'' parameter"} when ids is absent, {msg: "no ask ids
            provided"} when list is empty, or {msg: "too many ask ids provided; max
            is 64"} when over the limit; also returned (as HTTPBadRequest) when all
            instances fail.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/deployment/{id}/heartbeat/:
    post:
      summary: Send Deployment Heartbeat
      tags:
      - Serverless
      description: Updates the last client heartbeat timestamp for a deployment, used
        to prevent TTL-based auto-expiry.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the deployment to heartbeat.
      responses:
        '200':
          description: 'Returns {success: true, deployment_id: <id>}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  deployment_id:
                    type: integer
                    description: ID of the deployment that received the heartbeat.
              example:
                success: true
                deployment_id: 5
        '400':
          description: '"Invalid deployment ID"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"Deployment {deployment_id} not found."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/deployment/{id}/start/:
    post:
      summary: Start Deployment
      tags:
      - Serverless
      description: Sets the deployment's endpoint state to active, resuming autoscaler
        activity for the deployment.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the deployment to start.
      responses:
        '200':
          description: 'Returns {success: true, endpoint_state: ''active''}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  endpoint_state:
                    type: string
                    description: 'New endpoint state: "active".'
              example:
                success: true
                endpoint_state: active
        '404':
          description: '"Deployment {deployment_id} not found." or "Deployment {deployment_id}
            endpoint not found or already deleted."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/deployment/{id}/stop/:
    post:
      summary: Stop Deployment
      tags:
      - Serverless
      description: Sets the deployment's endpoint state to stopped, pausing autoscaler
        activity for the deployment.
      security:
      - BearerAuth: []
      x-scope: instance_write
      x-rateLimit: 2.0
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the deployment to stop.
      responses:
        '200':
          description: 'Returns {success: true, endpoint_state: ''stopped''}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success.
                  endpoint_state:
                    type: string
                    description: 'New endpoint state: "stopped".'
              example:
                success: true
                endpoint_state: stopped
        '404':
          description: '"Deployment {deployment_id} not found." or "Deployment {deployment_id}
            endpoint not found or already deleted."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/team/invite/:
    post:
      summary: Invite Team Member
      tags:
      - Team
      description: Sends an email invitation to a user to join the current team with
        a specified role.
      security:
      - BearerAuth: []
      x-scope: team_write
      x-rateLimit: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Email address of the user to invite
                  example: user@example.com
                role:
                  type: string
                  description: Role to assign to the new team member
                  example: developer
      responses:
        '200':
          description: 'Success: {"success": true, "msg": "New invitation sent to
            <email>"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: Confirmation including the invitee email address
              example:
                success: true
                msg: New invitation sent to user@example.com
        '400':
          description: Only a team account can invite; missing email or role param;
            invitee cannot get owner role; can't invite yourself; invitee is already
            a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: '"Sending account must be verified."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"Invalid role choice for invitee" or "Team metadata not found."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: '"Error: invitation already sent to <email> only <N> seconds
            ago." (rate limit)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/authorize-new-method/:
    post:
      summary: Authorize New 2FA Method
      tags:
      - Accounts
      description: Initiates authorization to add a new 2FA method by verifying identity
        with an existing method or backup code, returning a value used in the verification
        step.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tfa_method:
                  type: string
                  description: Existing method type to use for authorization; automatically
                    'email' when the account has no active methods
                  example: email
                  enum:
                  - sms
                  - totp
                  - email
                tfa_method_id:
                  type: integer
                  description: ID of an existing method to verify with; required for
                    sms/totp when the user has multiple methods of the same type
                  example: 3
                backup_code:
                  type: string
                  description: Backup code that skips the send/verify round-trip and
                    grants authorization directly
                  example: ABCD-EFGH-1234
      responses:
        '200':
          description: 'Returns {success: true, secret} (secret needed for PUT verify
            step), or {success: true, msg: "Authorization successful."} when a backup
            code is used.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  secret:
                    type: string
                    description: TFA secret required for the PUT verification step
                      (present when using a send/verify flow)
                  msg:
                    type: string
                    description: '"Authorization successful." (present when backup_code
                      is used and authorization is granted immediately)'
              example:
                success: true
                secret: abc123randomtoken
        '400':
          description: Email not verified ("email_not_verified"), invalid tfa_method
            ("invalid_tfa_method"), or Twilio error ("twilio_error").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated or invalid backup code ("invalid_backup_code").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Team user in team context ("team_user_forbidden").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Authorization service temporarily unavailable ("service_unavailable").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Verify New 2FA Method Authorization
      tags:
      - Accounts
      description: Completes the two-step authorization flow for adding a new 2FA
        method by verifying the code sent in the POST step.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Verification code received via the method chosen in
                    the POST step
                  example: '123456'
                secret:
                  type: string
                  description: The tfa_secret returned from the POST authorize-new-method
                    step
                  example: abc123secret
      responses:
        '200':
          description: 'Returns {success: true, msg: "Authorization successful."}
            after code verification.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  msg:
                    type: string
                    description: '"Authorization successful."'
              example:
                success: true
                msg: Authorization successful.
        '400':
          description: Missing code or secret ("missing_params"), no pending authorization
            found ("no_pending_authorization"), or invalid 2FA code ("2fa_verification_failed").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: User is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Team user in team context ("team_user_forbidden").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Authorization service temporarily unavailable ("service_unavailable").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/confirm-new/:
    post:
      summary: Confirm New 2FA Method
      tags:
      - Accounts
      description: Confirms a new SMS or TOTP 2FA method by verifying a code, enabling
        2FA on the account and returning backup codes on first method addition.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Verification code from the new 2FA method being confirmed
                  example: '123456'
                secret:
                  type: string
                  description: The tfa_secret returned when the code was sent (SMS)
                    or the TOTP secret from the setup step
                  example: abc123secret
                tfa_method:
                  type: string
                  description: Type of two-factor authentication method being confirmed;
                    defaults to 'sms' when a phone number is provided.
                  example: totp
                  enum:
                  - sms
                  - totp
                phone_number:
                  type: string
                  description: Phone number for SMS methods; falls back to account's
                    registered number
                  example: '+14155550123'
                label:
                  type: string
                  description: Optional display name for this method
                  example: Personal Phone
      responses:
        '200':
          description: 'Returns {success: true, msg: "{METHOD} 2FA method added successfully."}
            and includes backup_codes: [...] if this is the user''s first 2FA method.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: Confirmation message, e.g. "SMS 2FA method added
                      successfully."
                  backup_codes:
                    type: array
                    description: "Plaintext backup codes (returned only when this\
                      \ is the user's first ever 2FA method); store securely \u2014\
                      \ shown only once"
                    items:
                      type: string
              example:
                success: true
                msg: SMS 2FA method added successfully.
                backup_codes:
                - ABCD-EFGH-IJKL
                - MNPQ-RSTU-VWXY
        '400':
          description: Missing code or secret ("missing_auth_value"), invalid tfa_method
            ("invalid_tfa_method"), untracked legacy 2FA found ("untracked_2fa_found"),
            duplicate method ("duplicate_tfa_method"), or invalid 2FA code ("2fa_verification_failed").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: User is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authorization not completed ("authorization_required") or team
            user in team context ("team_user_forbidden").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Authorization service temporarily unavailable ("service_unavailable").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/email/:
    post:
      summary: Send 2FA Email Code
      tags:
      - Accounts
      description: Sends a 6-digit 2FA verification code to the user's verified email
        address.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                secret:
                  type: string
                  description: Existing tfa_secret to reuse when refreshing a code
                    during an active login challenge; omit to generate a new secret
                  example: abc123secret
      responses:
        '200':
          description: 'Returns {success: true, msg: "2FA code sent to your email
            address.", secret} where secret is used to verify the code.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: Confirmation message
                  secret:
                    type: string
                    description: TFA secret token to include in the subsequent verification
                      request
              example:
                success: true
                msg: 2FA code sent to your email address.
                secret: abc123randomtoken
        '400':
          description: No email associated with account ("missing_email"), email not
            verified ("email_not_verified"), or a recent code was already sent ("tfa_challenge_exists").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing 2FA secret or bearer token ("missing_auth_value").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/sms/:
    post:
      summary: Send 2FA SMS Code
      tags:
      - Accounts
      description: Sends a 2FA verification code to a phone number via SMS, for SMS
        2FA setup or login.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_number:
                  type: string
                  description: Phone number to send the code to in E.164 format; falls
                    back to the account's registered number if omitted
                  example: '+14155550123'
                tfa_method_id:
                  type: integer
                  description: ID of an existing SMS 2FA method whose phone number
                    should be used
                  example: 3
                secret:
                  type: string
                  description: Existing tfa_secret to reuse when refreshing a code
                    during an active login challenge
                  example: abc123secret
      responses:
        '200':
          description: 'Returns {msg: "2FA Sent", secret} where secret is used to
            verify the code.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    description: '"2FA Sent"'
                  secret:
                    type: string
                    description: TFA secret token to include in the subsequent verification
                      request
              example:
                msg: 2FA Sent
                secret: abc123randomtoken
        '400':
          description: Email not verified ("email_not_verified"), no phone number
            provided ("invalid_params"), a recent code already sent ("tfa_challenge_exists"),
            Twilio error on send ("twilio_error"), or number blocked by Twilio Lookup
            ("sms_blocked_number").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing 2FA secret or bearer token ("missing_auth_value").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: SMS sending disabled due to fraud ("sms_fraud_detected").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many SMS attempts ("sms_rate_limited" or "preauth_phone_cap").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/sms/resend/:
    post:
      summary: Resend 2FA SMS Code
      tags:
      - Accounts
      description: Resends a 2FA SMS verification code to the same phone number as
        the existing challenge.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.0
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                secret:
                  type: string
                  description: The tfa_secret from the original send; required unless
                    the user is authenticated via bearer token
                  example: abc123secret
                phone_number:
                  type: string
                  description: Phone number associated with the original challenge;
                    must match the number the code was first sent to
                  example: '+14155550123'
                tfa_method_id:
                  type: integer
                  description: ID of the SMS 2FA method to resend to; phone number
                    is taken from the stored method
                  example: 3
      responses:
        '200':
          description: 'Returns {msg: "A 6-digit code has been sent to your phone",
            secret}.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    description: '"A 6-digit code has been sent to your phone"'
                  secret:
                    type: string
                    description: The TFA secret (original or newly issued) to use
                      in the verification request
              example:
                msg: A 6-digit code has been sent to your phone
                secret: abc123randomtoken
        '400':
          description: Email not verified ("email_not_verified"), no existing challenge
            found ("no_challenge_found"), no secret or phone provided ("invalid_params"),
            phone number mismatch ("phone_number_mismatch"), or Twilio error ("twilio_error").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing 2FA secret or bearer token ("missing_auth_value").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: SMS sending disabled due to fraud ("sms_fraud_detected").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many SMS attempts ("sms_rate_limited" or "preauth_phone_cap").
          content:
            application/json:
