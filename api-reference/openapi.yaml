                    type: integer
                    description: ID of the newly created endpoint.
              example:
                success: true
                result: 15
        '400':
          description: Duplicate endpoint name already exists for this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Host-only accounts cannot create endpoints or use serverless
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/balance/{id}/:
