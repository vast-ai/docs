      responses:
        '200':
          description: '{"msg": "success"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    description: '"success" on successful removal'
              example:
                msg: success
        '400':
          description: Cannot remove owner role; cannot remove member's only role
