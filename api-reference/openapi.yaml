            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when reboot was initiated
                  error:
                    type: string
                    description: Error code if success is false
                  msg:
                    type: string
                    description: Human-readable message
              example:
                success: true
        '400':
          description: 'Returns {success: false, error: "invalid_args", msg: "invalid
            instance_id"} when the instance doesn''t belong to the user or isn''t
            found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/instances/recycle/{id}/:
