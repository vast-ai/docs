      - Accounts
      description: Returns the id, name, and permissions for a specific team role
        by name.
      security:
      - BearerAuth: []
      x-scope: team_read
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Name of the team role
      responses:
        '200':
          description: Role object with id, name, and permissions fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique role identifier
                  name:
                    type: string
                    description: Role display name
                  permissions:
                    type: object
                    description: Permission set granted by this role
              example:
                id: 7
                name: developer
                permissions: {}
        '404':
          description: '"Role not found"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update Team Role
      tags:
      - Team
      description: Updates the name and permissions of an existing team role.
      security:
      - BearerAuth: []
      x-scope: team_write
      x-rateLimit: 2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the role to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: New name for the role.
                permissions:
                  type: object
                  description: JSON encoded permissions for the role.
      responses:
        '200':
          description: '{"success": true, "msg": "Successfully Updated Team Role For
            <name>"} or no-op message if permissions unchanged'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: Human-readable confirmation message
              example:
                success: true
                msg: Successfully Updated Team Role For developer
        '400':
          description: Role id must be an integer; missing required params; role name
            must be 2-50 characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Only team accounts can update roles; cannot modify current
            key's permissions; duplicate role name; cannot update team owner role;
            caller lacks sufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: '"Role with id <id> not found."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/template/:
    delete:
      summary: Delete Template
      tags:
      - Templates
      description: Soft-deletes a template owned by the authenticated user, provided
        no other users currently have an active relationship to it.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                template_id:
                  type: integer
                  description: Numeric ID of the template to delete (not hash_id)
      responses:
        '200':
          description: 'Returns {success: true, msg: "Template {id} Deleted Successfully"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  msg:
                    type: string
                    description: E.g. "Template 123 Deleted Successfully"
              example:
                success: true
                msg: Template 42 Deleted Successfully
        '400':
          description: 'Missing or non-integer template_id: {success: false, msg:
            "Invalid Template ID or User ID"} or "Template ID must be integer"; or
            other users still use the template: "Cannot Delete Template. Other Users
            are still using it."'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 'Authenticated user is not the template creator: {success:
            false, msg: "Templates can ONLY be Deleted by their Creator"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List Templates
      tags:
      - Search
      description: Search and list templates using optional query and filter parameters;
        returns public templates and the authenticated user's own private templates.
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit:
        profile: low_volume_burst
        threshold: 1.9
      parameters:
      - name: select_filters
        in: query
        required: false
        schema:
          type: string
        description: 'JSON-encoded filter object. Format: `{"field": {"op": value}}`.
          Example: `{"use_ssh": {"eq": true}, "recommended": {"eq": true}}` or `{"count_created":
          {"gt": 100}}`

          '
      - name: select_cols
        in: query
        required: false
        schema:
          type: string
        description: 'JSON-encoded array of columns to return. Example: `["*"]` for
          all columns or `["id", "name", "hash_id"]` for specific columns.

          '
      - name: order_by
        in: query
        required: false
        schema:
          type: string
        description: Column to order the results by.
      responses:
        '200':
          description: 'Returns {success, templates_found, templates} on success,
            or {success: false, msg: "No templates found"} when no results match'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True if templates were found, false otherwise
                  msg:
                    type: string
                    description: 'Present when no templates are found: "No templates
                      found"'
                  templates_found:
                    type: integer
                    description: Count of returned templates
                  templates:
                    type: array
                    items:
                      type: object
                    description: Array of matching template objects
        '400':
          description: 'Malformed JSON body or unexpected error; returns {success:
            false, error, msg}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create Template
      tags:
      - Templates
      description: Creates a new template for the authenticated user, or links an
        existing matching template to the user if it already exists.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.9
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  default: Example Template
                  description: Name of the template
                image:
                  type: string
                  default: vastai/base-image
                  description: Docker image path. Used when launching instances from
                    this template.
                tag:
                  type: string
                  default: latest
                  description: 'Docker image tag specifying version of the image.
                    Defaults to `latest`. Can also be included in the `image` field
                    instead.

                    '
                env:
                  type: string
                  description: 'Environment variables and port mappings in Docker
                    flag format.


                    Example: `"-e HF_TOKEN=hf_xxx123456789 -e MODEL_ID=TheBloke/Llama-2-7B-Chat-GPTQ
                    -p 8000:8000"`

                    '
                onstart:
                  type: string
                  description: "Commands to run when instance starts\n\nExample :\
                    \ `env | grep _ >> /etc/environment; echo 'starting up'` \n"
                runtype:
                  type: string
                  enum:
                  - ssh
                  - jupyter
                  - args
                  default: args
                  description: 'Launch mode for the instance. Defaults to `args`.
                    Recommended - use `ssh` with `ssh_direct: true` for reliable SSH
                    access.

                    '
                ssh_direct:
                  type: boolean
                  description: Enable direct SSH connection
                jup_direct:
                  type: boolean
                  description: Enable direct Jupyter connection
                jupyter_dir:
                  type: string
                  description: 'Directory to launch Jupyter from


                    Example : `/home/notebooks`

                    '
                use_jupyter_lab:
                  type: boolean
                  description: Use JupyterLab instead of Jupyter Notebook
                docker_login_repo:
                  type: string
                  description: Name of the private Docker repo (i.e docker.io)
                docker_login_user:
                  type: string
                  description: Username for private Docker repo
                docker_login_pass:
                  type: string
                  description: Access token or password for private Docker repo.
                extra_filters:
                  type: object
                  description: 'Additional machine search filters. Example: `{"cuda_max_good":
                    {"gte": 12.6}}`

                    '
                recommended_disk_space:
                  type: number
                  description: Recommended disk space in GB. Defaults to 8GB if not
                    specified.
                desc:
                  type: string
                  description: Short description of the template
                readme:
                  type: string
                  description: Longer documentation/readme content for the template
                args_str:
                  type: string
                  description: Arguments string passed to the container entrypoint
                    when runtype is `args`
                use_ssh:
                  type: boolean
                  description: Enable SSH access to instances created from this template
                href:
                  type: string
                  description: Link to Docker Hub or image documentation
                repo:
                  type: string
                  description: Repository identifier (e.g., `library/ubuntu`)
                private:
                  type: boolean
                  description: Whether the template is private (not publicly searchable)
                volume_info:
                  type: object
                  nullable: true
                  description: 'UI hint for volume configuration. Note: This does
                    not affect instance creation - use `volume_info` in the instance
                    creation request to actually attach volumes.

                    '
                hash_id:
                  type: string
                  description: Content-based hash ID of the template. Can be included
                    when editing but will change based on new content.
              required:
              - name
              - image
            example:
              name: Example Template
              image: vastai/base-image
              tag: latest
              env: -e MY_VAR=value -p 8000:8000
              runtype: ssh
              ssh_direct: true
      responses:
        '200':
          description: 'New template created: {success: true, msg: "Template Created
            Successfully! New Template ID: ...", template}; or existing found: {success:
            false, msg: "Existing Template Found: ...", template}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True when created; false when an existing template
                      was found
                  msg:
                    type: string
                    description: 'Describes outcome, e.g. ''Template Created Successfully!
                      New Template ID: 123'' or ''Existing Template Found: 123. User
                      relationship added.'''
                  template:
                    type: object
                    description: The created or found template object (docker_login_pass
                      masked)
        '400':
          description: 'Missing or invalid template name, invalid docker credentials,
            invalid column names, field exceeds max length, or creation failure; returns
            {success: false, error, msg}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update Template
      tags:
      - Templates
      description: Updates an existing template identified by hash_id; if other users
        share the template, a new version is created to preserve the original.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.9
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hash_id:
                  type: string
                  description: Hash ID of the template to edit. Required for identifying
                    which template to update.
                name:
                  type: string
                  description: Name of the template
                image:
                  type: string
                  description: Docker image path
                desc:
                  type: string
                  description: Short description of the template
                recommended_disk_space:
                  type: number
                  description: Recommended disk space in GB
                template:
                  type: object
                  description: Template object whose hash_id is used as a fallback
                    to identify the template to update when no top-level hash_id is
                    provided.
              required:
              - hash_id
            example:
              hash_id: 5915f1dc1ce881defb572015eb9d8178
              desc: Updated description
              recommended_disk_space: 16
      responses:
        '200':
          description: 'Returns {success: true, hash_id, msg: "Template {id} Updated
            Successfully", template}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true on success
                  hash_id:
                    type: string
                    description: New MD5 hash of the updated template
                  msg:
                    type: string
                    description: E.g. "Template 123 Updated Successfully"
                  template:
                    type: object
                    description: The updated template object
        '400':
          description: 'Invalid hash_id: "Unable to Update Template. None found for
            given Hash ID: ..."; wrong creator: "Only the Template Creator may Update
            Existing Template."; unexpected column key: "Unexpected Key ''...'' found
            in Template."; or other validation errors'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/tfa/:
    delete:
      summary: Remove 2FA Method
      tags:
      - Accounts
      description: Removes a specific 2FA method after verifying with an existing
        method or backup code; disables 2FA entirely if no methods remain.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                target_id:
                  type: integer
                  description: ID of the 2FA method to remove
                  example: 7
                tfa_method_id:
                  type: integer
                  description: ID of the 2FA method used to authenticate this removal
                    request
                  example: 7
                code:
                  type: string
                  description: Verification code from the authenticating 2FA method
                  example: '654321'
                secret:
                  type: string
                  description: tfa_secret token from the prior step (required for
                    SMS/email)
                  example: abc123secret
                tfa_method:
                  type: string
                  description: Method type used to authenticate the removal request
                  example: totp
                  enum:
                  - sms
                  - totp
                  - email
                backup_code:
                  type: string
                  description: One-time-use backup code that can authorize the removal
                    instead of a normal code
                  example: ABCD-EFGH-1234
                delete_legacy:
                  type: boolean
                  description: Set to true to disable legacy SMS 2FA (requires email
                    verification); for accounts that predate the current 2FA system
                  example: false
      responses:
        '200':
          description: 'Returns {msg: "2FA method removed", remaining_methods} or
            {msg: "2FA Successfully Disabled"} if all methods are removed.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    description: '"2FA Successfully Disabled" if all methods removed,
                      or "2FA method removed"'
                  remaining_methods:
                    type: integer
                    description: Number of active 2FA methods remaining after deletion
                      (present when 2FA is not fully disabled)
              example:
                msg: 2FA method removed
                remaining_methods: 1
        '400':
          description: Missing code or backup_code ("missing_auth_value"), invalid
            params, legacy deletion requires email verification, email 2FA cannot
            be removed, invalid tfa_method, or invalid 2FA code ("2fa_verification_failed").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated or invalid backup code ("invalid_backup_code").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Team user attempting 2FA action in team context ("team_user_forbidden").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed 2FA attempts, method locked ("tfa_locked")
            or Twilio rate limited ("twilio_rate_limited").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Log In with 2FA
      tags:
      - Accounts
      description: Verifies a 2FA code (SMS, TOTP, email, or backup code) and creates
        a 24-hour 2FA session key on success.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 1.1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tfa_method_id:
                  type: integer
                  description: ID of a specific configured 2FA method to verify against,
                    when the user has multiple methods of the same type
                  example: 3
                code:
                  type: string
                  description: The 2FA verification code received by the user
                  example: '123456'
                secret:
                  type: string
                  description: The tfa_secret token issued during the prior auth step
                    (required for UI flow and SMS CLI flow)
                  example: abc123secret
                tfa_method:
                  type: string
                  description: The 2FA method being verified
                  example: totp
                  enum:
                  - sms
                  - totp
                  - email
                backup_code:
                  type: string
                  description: One-time-use backup code (e.g. ABCD-EFGH-IJKL) that
                    bypasses normal 2FA verification
                  example: ABCD-EFGH-1234
                admin:
                  type: boolean
                  description: Request an admin-privileged session; only effective
                    for admin users
                  example: false
      responses:
        '200':
          description: Returns formatted user object; includes session_key if called
            from CLI, backup_codes_remaining if a backup code was used, and legacy_tfa_user
            flag if applicable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_key:
                    type: string
                    description: Unhashed 2FA session API key (returned only for CLI
                      / Bearer-token callers)
                  backup_codes_remaining:
                    type: integer
                    description: Number of remaining backup codes if a backup code
                      was used
                  legacy_tfa_user:
                    type: boolean
                    description: Present and true if the user is on the legacy 2FA
                      system
        '400':
          description: Invalid tfa_method ("invalid_tfa_method"), SMS 2FA has no phone
            number ("2fa_login_failed"), invalid 2FA code ("2fa_verification_failed"),
            or 2FA token expired ("2fa_expired").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing auth value ("missing_auth_value"), invalid backup code
            ("invalid_backup_code"), or bearer token invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed 2FA attempts, method locked ("tfa_locked")
            or Twilio rate limited ("twilio_rate_limited").
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/users/cloud/:
    delete:
      summary: Delete Cloud Connection
      tags:
      - Accounts
      description: Removes a linked cloud storage connection from the authenticated
        user's account by connection ID.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.9
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ID of the cloud connection to remove.
                  example: 42
      responses:
        '200':
          description: 'Success: {"success": true, "msg": "Deleted Connection"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  msg:
                    type: string
                    description: '"Deleted Connection"'
              example:
                success: true
                msg: Deleted Connection
        '400':
          description: 'Bad request: {"success": false, "msg": "Missing param: id"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 'Not found or not authorized: {"success": false, "msg": "Cloud
            Connection Not Found"}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List Cloud Connections
      tags:
      - Accounts
      description: Returns the authenticated user's linked cloud storage connections
        (Google Drive, S3, Backblaze, Dropbox).
      security:
      - BearerAuth: []
      x-scope: user_read
      x-rateLimit: 2.9
      responses:
        '200':
          description: 'Successful response: list of cloud service connection objects
            with id, cloud_type, user_given_name, and other fields'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Cloud connection record with id, cloud_type, user_given_name,
                    and other fields
    post:
      summary: Authorize Cloud Service
      tags:
      - Accounts
      description: Links a cloud storage provider (Google Drive, S3, Backblaze B2,
        or Dropbox) to the authenticated user's account using OAuth or credentials.
      security:
      - BearerAuth: []
      x-scope: user_write
      x-rateLimit: 2.9
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: OAuth authorization code (required for Google Drive
                    and Dropbox providers).
                provider:
                  type: string
                  description: Cloud storage provider to connect.
                  example: s3
                  enum:
                  - drive
                  - s3
                  - b2
                  - dropbox
                user_given_name:
                  type: string
                  description: User-supplied name for this connection (required for
                    all providers except Dropbox, which uses the name from the OAuth
                    flow).
                secret_access_key:
                  type: string
                  description: AWS Secret Access Key (required for S3 provider).
                access_key:
                  type: string
                  description: AWS Access Key ID (required for S3 provider).
                application_key:
                  type: string
                  description: Backblaze Application Key secret (required for B2 provider).
                key_id:
                  type: string
                  description: Backblaze Application Key ID (required for B2 provider).
                state:
                  type: string
                  description: OAuth state parameter returned from Dropbox redirect
                    (required for Dropbox provider).
      responses:
        '200':
          description: 'Success (Dropbox): {"success": true, "msg": "Dropbox Authenticated"}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Always true
                  msg:
                    type: string
                    description: Confirmation message (e.g. "Dropbox Authenticated")
        '400':
          description: 'Bad request: "Missing input: provider", "Missing input: user_given_name",
            "Source and Destination Cannot Contain Whitespaces or Unauthorized characters",
            "Invalid provider", "Missing state parameter", "Invalid or expired OAuth
            state", or "OAuth state does not match current user"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v0/users/{user_id}/templates/:
